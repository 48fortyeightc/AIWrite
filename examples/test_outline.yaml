  draft_latex: '\section{相关技术概述}


    图像分类技术的演进与深度学习理论及模型架构的发展紧密相连。从早期依赖手工特征的传统方法，到如今以数据驱动的深度神经网络，图像分类的性能与效率均实现了显著突破。本章将系统梳理支撑本研究的关键技术，包括深度学习的基础原理、在图像分类史上具有里程碑意义的经典模型，以及当前该领域的前沿进展。


    \subsection{深度学习基础}


    深度学习作为机器学习的一个重要分支，其核心思想是通过构建具有多个隐藏层的神经网络（Deep Neural Networks, DNNs）来学习数据的层次化特征表示。一个基本的神经网络由大量称为“神经元”的简单处理单元相互连接构成。每个神经元接收来自前一层神经元的输入信号，对这些信号进行加权求和并加上一个偏置项，然后通过一个非线性激活函数（如Sigmoid、Tanh或ReLU）产生输出。这种结构使得网络能够逼近任何复杂的非线性函数。


    网络中的神经元通常被组织成不同的“层”，包括输入层、隐藏层和输出层。数据从输入层流入，经过隐藏层的逐层变换，最终在输出层得到预测结果，这一过程称为“前向传播”。为了训练网络，需要定义损失函数来衡量预测值与真实值之间的差距，并通过反向传播算法计算损失函数对每个网络参数的梯度，进而使用梯度下降等优化算法迭代更新参数，最小化损失。


    在图像处理领域，卷积神经网络（Convolutional Neural Network, CNN）是应用最为广泛的深度学习架构。CNN通过其特有的结构组件有效利用了图像数据的空间局部相关性。卷积层是CNN的核心，它使用一系列可学习的卷积核（或滤波器）在输入图像或特征图上进行滑动窗口计算，提取局部特征（如边缘、纹理）。每个卷积核会生成一个特征图（Feature
    Map），通过堆叠多个卷积层，网络可以学习到从低级到高级的复杂特征层次。


    池化层（通常是最大池化或平均池化）紧随卷积层之后，其主要作用是对特征图进行下采样，降低数据维度，减少计算量，同时增强特征的空间不变性，使模型对输入图像的平移、旋转等微小变化更具鲁棒性。激活函数（如ReLU及其变体）被嵌入在卷积层或全连接层之后，为网络引入非线性变换，使其能够学习更复杂的模式。在经过若干轮卷积和池化操作后，提取到的高级特征图会被展平，并输入到一个或多个全连接层中。全连接层的作用是将学习到的分布式特征表示映射到样本的标记空间，最终通过输出层（如Softmax函数）完成分类任务。


    \subsection{经典图像分类模型}


    深度学习在图像分类领域的成功，是由一系列具有开创性意义的经典模型所推动的。这些模型在架构设计上的创新，不断刷新着分类精度的纪录，并奠定了现代CNN的基础。


    LeNet-5是CNN的早期成功实践，由Yann LeCun等人于1998年提出，主要用于手写数字识别。其架构清晰地展示了卷积层、池化层（当时使用子采样层）和全连接层的交替堆叠模式，为后续研究提供了范式。然而，受限于当时的数据规模和计算能力，深度学习并未立即得到广泛应用。


    直到2012年，AlexNet在ImageNet大规模视觉识别挑战赛（ILSVRC）中取得突破性胜利，深度学习的潜力才被充分认识。AlexNet本质上是一个更深入、更宽的LeNet，它首次成功应用了ReLU激活函数来缓解梯度消失问题，采用Dropout技术在全连接层防止过拟合，并使用GPU进行并行训练以处理海量数据。其双GPU流设计虽然后来较少使用，但体现了对大规模计算的早期探索。


    VGGNet由牛津大学视觉几何组于2014年提出，其核心贡献在于深入探讨了网络深度对性能的影响。VGGNet（如VGG-16、VGG-19）通过使用堆叠的3x3小卷积核来替代更大的卷积核（如5x5、7x7），在保持相同感受野的同时减少了参数量，并增加了网络深度。这种简洁而统一的模块化设计使得模型具有更强的表征能力，但随之而来的是巨大的计算开销和参数量。


    随着网络深度的不断增加，模型训练变得异常困难，出现了梯度消失/爆炸和网络退化（即深度网络的表现反而不如浅层网络）问题。ResNet（残差网络）的提出有效地解决了这一难题。ResNet创新性地引入了“残差块”结构，该结构通过快捷连接（Shortcut
    Connection）将输入直接跳层传递到输出。网络不再需要学习一个完整的映射，而是学习输入与输出之间的残差。这种设计使得梯度可以直接反向传播到浅层，极大缓解了深度网络的训练难题，使得构建数百甚至上千层的超深网络成为可能，并显著提升了分类精度。


    \subsection{图像分类技术前沿}


    近年来，图像分类技术持续演进，呈现出模型架构多元化、训练范式多样化的趋势，涌现出多个引人注目的前沿方向。


    基于Transformer的架构在自然语言处理领域取得巨大成功后，开始被引入计算机视觉。Vision Transformer（ViT）是这一方向的代表性工作。ViT将输入图像分割成一系列固定大小的图像块（Patches），将这些图像块线性嵌入后，加上位置编码，直接送入标准的Transformer编码器进行处理。ViT摒弃了CNN固有的归纳偏置（如平移不变性和局部性），完全依赖自注意力机制在全局范围内建立图像块之间的关系，从而学习图像特征。在大规模数据集上预训练后，ViT展现出了与顶尖CNN模型相媲美甚至更优的性能，但其对数据量的要求较高，且计算复杂度随图像分辨率平方增长。


    面向移动端和嵌入式设备的实际应用需求，轻量级模型的设计成为研究热点。这类模型旨在保持较高精度的同时，大幅减少模型的参数数量和计算量。MobileNet系列利用深度可分离卷积替代标准卷积，将卷积操作分解为深度卷积和逐点卷积两个步骤，有效降低了计算成本。ShuffleNet则通过引入通道混洗操作，在分组卷积的基础上促进不同组之间的信息交流，进一步提升了计算效率。这些模型为图像分类技术在资源受限环境下的部署提供了可能。


    自监督学习的兴起减少了对大规模人工标注数据的依赖。其核心思想是设计无需人工标签的预训练任务（前置任务），让模型从数据本身学习通用的视觉表征，然后再将学到的表征迁移到下游任务（如图像分类）中。MoCo（动量对比）通过构建一个动态的字典，将查询样本与字典中的键进行对比学习，使得正样本对的特征相似而负样本对的特征相异。SimCLR（一个简单的对比学习框架）则通过数据增强产生同一图像的两个不同视图，并最大化这两个视图在特征空间中的一致性。这些方法学习到的表征质量极高，在多个视觉任务上取得了接近甚至超越有监督预训练模型的性能。'
