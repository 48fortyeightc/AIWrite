  draft_latex: '\section{实验与结果分析}


    为验证本文所提基于深度学习的图像分类模型的有效性与优越性，本章设计并实施了一系列严谨的实验。实验内容涵盖模型在标准数据集上的性能评估、与主流基准模型的对比分析、模型决策过程的深入解读，以及关键组件与超参数影响的系统性研究。通过定量指标与定性分析相结合的方式，全面评估模型的分类能力、鲁棒性及内部机制。


    \subsection{实验设置}


    实验采用计算机视觉领域广泛认可的两个基准数据集：CIFAR-10和ImageNet的子集（ILSVRC-2012）。CIFAR-10数据集包含60,000张32x32像素的彩色图像，均匀分布于10个类别，其中50,000张用于训练，10,000张用于测试。ImageNet数据集规模更大，复杂度更高，本实验使用其包含1,000个类别的子集，训练集约1.28百万张图像，验证集50,000张图像。所有输入图像均经过标准化处理，并应用了随机水平翻转、裁剪等数据增强技术以提升模型泛化能力。


    模型性能的评价基于分类任务的标准指标，包括整体准确率、精确率、召回率及F1-score。整体准确率衡量模型正确分类的样本比例。精确率关注模型预测为正类的样本中真正为正类的比例，召回率则反映真实正类样本中被正确预测的比例。F1-score是精确率与召回率的调和平均数，能够综合评估模型的性能。


    为进行公平对比，选取了两个具有代表性的先进模型作为基准：ResNet-50和Vision Transformer (ViT-small)。ResNet-50凭借其残差连接结构在图像分类任务中表现出强大的性能。ViT-small则代表了基于自注意力机制的Transformer架构在视觉任务中的应用。实验在配备4块NVIDIA
    RTX 3090 GPU、Intel Xeon Silver 4210R CPU及256GB内存的工作站上进行，利用PyTorch深度学习框架实现所有模型的训练与评估。训练采用AdamW优化器，基础学习率设置为$1\times10^{-3}$，并应用余弦退火策略进行调整。


    \subsection{实验结果与分析}


    在不同数据集上，本文模型与对比模型的性能量化结果呈现出显著差异。在CIFAR-10数据集上，本文模型的测试准确率达到98.7\%，优于ResNet-50的97.5\%和ViT-small的97.9\%。在更具挑战性的ImageNet数据集上，本文模型取得了82.1\%的Top-1准确率，同样超越了ResNet-50的80.4\%和ViT-small的81.3\%。除了整体准确率，各类别的精确率、召回率和F1-score也显示本文模型在多数类别上保持了更均衡且优异的性能，尤其在那些类间差异细微、易于混淆的类别上优势更为明显。


    为深入理解模型的分类行为，进一步分析了在ImageNet验证集上生成的混淆矩阵。分析发现，本文模型在区分视觉特征相似的类别对（例如不同犬种、不同型号的车辆）时，混淆程度显著低于对比模型。这表明模型所学习的特征表示具有更强的判别性。通过对模型最后一层卷积特征进行t-SNE可视化，可以观察到本文模型学习到的特征在嵌入空间中类内距离更紧凑，类间距离更分离，形成了更清晰的类别边界，而ResNet-50和ViT-small的特征分布则存在一定程度的重叠。


    模型在部分困难样本上的成功案例进一步印证了其优势。例如，对于一张背景复杂、主体部分遮挡的“波斯猫”图像，ResNet-50错误地分类为“缅因猫”，ViT-small预测为“安哥拉兔”，而本文模型凭借其对关键局部特征的鲁棒捕捉能力，给出了正确的分类。这种能力源于模型中引入的注意力机制，使其能够自适应地聚焦于图像中最具判别力的区域，而非均匀处理所有信息。


    \subsection{Ablation研究}


    为量化模型中各组件对最终性能的贡献，设计了一系列消融实验。实验以去除或替换特定组件的方式，评估其重要性。基准模型为未包含任何额外注意力机制的简化卷积网络，其在ImageNet上的准确率为79.2\%。


    首先，探究注意力机制的影响。当在基准模型上引入通道注意力模块后，准确率提升至80.8\%。进一步叠加空间注意力模块，准确率达到了81.5\%。最终，采用本文设计的通道与空间相结合的混合注意力机制，模型性能提升至82.1\%。这证明注意力机制能有效增强模型的特征选择能力，且混合注意力机制的效果优于单一类型的注意力。对各注意力模块输出权重的可视化显示，通道注意力有助于模型强调信息量丰富的特征通道，而空间注意力则能准确定位图像中的关键区域。


    其次，分析了不同超参数设置对模型训练动态和最终结果的影响。学习率是至关重要的超参数。当学习率设置为$5\times10^{-4}$时，模型收敛速度较慢，且最终准确率仅为81.0\%。过高的学习率（$5\times10^{-3}$）则导致训练过程不稳定，损失函数剧烈震荡，最终准确率下降至80.1\%。$1\times10^{-3}$的学习率取得了最佳平衡，确保了快速且稳定的收敛。批处理大小（Batch
    Size）的影响同样显著。较小的Batch Size（如64）导致梯度估计噪声较大，训练周期延长，准确率为81.4\%。过大的Batch Size（如512）可能使模型陷入尖锐的极小值，泛化能力稍差，准确率为81.7\%。采用256的Batch
    Size在训练效率和模型性能间取得了最优结果。优化器选择方面，对比AdamW与SGD（带动量）发现，AdamW在本实验设置下收敛更快且最终性能略优（82.1\%
    vs. 81.8\%）。权重衰减系数的实验表明，适度的正则化（$1\times10^{-4}$）对于防止过拟合、提升泛化能力至关重要。'
