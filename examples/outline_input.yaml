    notes: 设计分层架构（用户层、服务层、模型层、数据层），说明各层的职责与交互逻辑
    draft_latex: "\\section{系统架构设计}\n\n为实现基于大语言模型的自动化论文写作系统的各项功能需求，并确保系统的高可用性、可扩展性与可维护性，本文设计了一套清晰的分层架构。该架构遵循“高内聚、低耦合”的设计原则，将系统划分为四个核心层次：用户层、服务层、模型层和数据层。各层职责明确，通过定义良好的接口进行交互，共同构成了系统的整体技术框架。系统总体架构如图4-1所示。\n\
      \n\\begin{figure}[h]\n\\centering\n\\includegraphics[width=0.9\\textwidth]{system_architecture.png}\n\
      \\caption{系统分层架构图}\n\\label{fig:system_architecture}\n\\end{figure}\n\n\\subsection{用户层}\n\
      \n用户层是系统与最终用户进行交互的直接界面，承担着信息呈现与用户指令接收的职责。本系统采用B/S架构，用户通过标准的Web浏览器即可访问系统，无需安装额外的客户端软件，极大地提升了系统的易用性和可访问性。\n\
      \n用户层的主要组件包括：\n\\begin{itemize}\n    \\item \\textbf{用户界面：} 基于React/Vue等现代前端框架构建的响应式单页面应用，提供论文主题输入、写作参数配置、内容生成过程展示、草稿编辑与导出等交互功能。界面设计遵循用户体验原则，确保操作流程简洁直观。\n\
      \    \\item \\textbf{状态管理：} 负责维护前端应用的状态，如用户登录状态、当前编辑的论文章节、生成任务的状态等，保证用户交互的连贯性。\n\
      \    \\item \\textbf{API调用模块：} 封装了与服务层后端API的所有通信逻辑，使用HTTP/HTTPS协议向后端发起请求，并处理返回的响应数据或错误信息。\n\
      \\end{itemize}\n\n用户层通过调用服务层提供的RESTful API与服务层进行交互，将用户的写作请求（如生成摘要、撰写文献综述）发送至服务层，并接收服务层返回的结构化数据（如生成的文本、任务ID等），最终将其渲染展示给用户。\n\
      \n\\subsection{服务层}\n\n服务层是系统的业务逻辑核心，充当用户层与模型层、数据层之间的桥梁。它负责处理用户请求，编排复杂的业务流程，并确保整个系统的稳定运行。服务层采用微服务架构风格，将不同功能模块解耦，便于独立开发、部署和扩展。\n\
      \n服务层的主要职责与组件包括：\n\\begin{itemize}\n    \\item \\textbf{API网关：} 作为系统的统一入口，负责请求路由、负载均衡、身份认证、权限校验、限流与熔断等跨领域关切点。所有来自用户层的请求首先经由API网关分发至相应的内部微服务。\n\
      \    \\item \\textbf{用户服务：} 管理用户注册、登录、身份验证与个人信息维护。\n    \\item \\textbf{写作任务服务：}\
      \ 这是最核心的业务服务。它接收用户层的写作请求，对请求参数进行验证和预处理。随后，该服务会调用模型层的相关接口以获取大语言模型生成的文本内容。此外，它还负责管理写作任务的队列、调度与状态跟踪。\n\
      \    \\item \\textbf{内容管理与编辑服务：} 负责对模型生成的内容或用户手动编辑的草稿进行持久化存储、版本管理、结构化组织（按章节划分）以及提供文本编辑相关的辅助功能。\n\
      \    \\item \\textbf{业务逻辑编排：} 协调各个微服务，完成复杂的业务流程。例如，一个“生成完整论文大纲”的请求，可能涉及顺序调用多个模型服务来生成各章节标题和概要。\n\
      \\end{itemize}\n\n服务层通过RPC或内部API调用与模型层交互，获取AI生成能力；同时通过数据访问层与数据层交互，完成数据的持久化操作。\n\
      \n\\subsection{模型层}\n\n模型层封装了系统的核心智能能力，即大语言模型的推理与文本生成功能。该层旨在为大语言模型的调用提供统一、高效且可扩展的接口，并对模型资源进行有效管理。\n\
      \n模型层的主要组件包括：\n\\begin{itemize}\n    \\item \\textbf{模型推理API：} 提供标准化的接口供服务层调用。接口通常接收提示词、生成参数，并返回生成的文本。本系统设计支持同时接入多种大语言模型，如GPT系列、ChatGLM、LLaMA等，通过统一的适配器模式来屏蔽不同模型底层API的差异。\n\
      \    \\item \\textbf{提示词工程模块：} 该模块是提升生成内容质量的关键。它根据服务层传递的写作任务类型和参数，动态构建高质量、结构化的提示词，以引导大语言模型生成符合学术规范的论文内容。\n\
      \    \\item \\textbf{模型管理与调度：} 负责管理多个模型实例，实现负载均衡。当某个模型服务不可用时，可以自动故障转移至备用实例。该模块还负责监控模型的性能指标，如响应时间、并发处理能力等。\n\
      \    \\item \\textbf{缓存机制：} 对于常见或重复的写作请求，模型层可引入缓存机制，存储“提示词-生成结果”对，从而减少对模型的实际调用次数，降低延迟与成本。\n\
      \\end{itemize}\n\n模型层接收来自服务层的生成请求，经过内部处理后，将大语言模型生成的文本内容返回给服务层。模型层通常部署在具有高性能GPU计算资源的服务器上，以确保模型推理的速度。\n\
      \n\\subsection{数据层}\n\n数据层负责系统所有数据的持久化存储、管理与访问，为上层服务提供可靠的数据支撑。根据数据类型和访问特点，本系统采用了多元化的数据存储方案。\n\
      \n数据层主要包括以下组件：\n\\begin{itemize}\n    \\item \\textbf{关系型数据库：} 采用MySQL或PostgreSQL，用于存储结构化数据，如用户账户信息、论文项目元数据、系统配置信息、写作任务日志等。关系型数据库保证了事务的一致性和数据的完整性。\n\
      \    \\item \\textbf{文档数据库：} 采用MongoDB，用于存储非结构化的论文内容数据，如生成的章节草稿、用户编辑历史、章节间的关联信息等。文档模型的灵活性非常适合存储和查询不断演进的论文草稿。\n\
      \    \\item \\textbf{向量数据库：} 可选组件，用于存储学术文献等知识的向量化表示。当系统需要集成检索增强生成功能时，向量数据库可以高效地进行语义相似度检索，为模型生成提供相关背景知识。\n\
      \    \\item \\textbf{缓存数据库：} 采用Redis，用于缓存热点数据，如用户会话信息、频繁访问的生成结果、系统配置等，以显著提升系统的响应速度。\n\
      \    \\item \\textbf{对象存储服务：} 用于存储用户上传的参考文献、图片等二进制文件，以及最终导出的PDF/DOCX格式的论文文件。\n\
      \\end{itemize}\n\n数据层通过数据访问对象或ORM框架向服务层提供统一的数据访问接口，服务层无需关心底层数据的存储细节，只需通过接口进行数据的增删改查操作。\n\
      \n\\subsection{各层交互逻辑}\n\n系统各层之间通过定义清晰的接口协议进行协作。一个典型的“生成论文引言”任务的交互流程如下：\n1.\
      \ 用户在用户层的界面中输入主题并点击生成按钮。\n2. 用户层通过HTTP请求将任务发送至服务层的API网关。\n3. API网关进行认证后，将请求路由至写作任务服务。\n\
      4. 写作任务服务验证参数，并可能从数据层查询相关背景信息。\n5. 写作任务服务调用模型层的模型推理API，并附上由提示词工程模块构建好的提示词。\n\
      6. 模型层调用大语言模型进行推理，生成引言文本并返回给写作任务服务。\n7. 写作任务服务将生成的内容发送至内容管理服务。\n8. 内容管理服务将内容持久化存储到数据层的文档数据库中，并更新相关元数据。\n\
      9. 写作任务服务将生成成功的结果（如内容ID或直接返回内容）经由API网关返回给用户层。\n10. 用户层接收响应，更新界面状态，向用户展示新生成的引言段落。\n\
      \n综上所述，本系统通过分层架构设计，有效地分离了关注点，使得系统结构清晰、易于维护和扩展。各层各司其职又紧密协作，共同支撑起自动化论文写作的核心业务流程。"
    final_latex: "\\section{系统架构设计}\n\n为有效实现基于大语言模型的自动化论文写作系统的各项功能需求，并确保系统具备高可用性、可扩展性与可维护性，本文设计了一套层次化的系统架构。该架构遵循“高内聚、低耦合”的设计原则，将系统划分为四个核心层次：用户层、服务层、模型层和数据层。各层次职责明确，通过定义良好的接口进行交互，共同构成系统的整体技术框架。系统总体架构如图4-1所示。\n\
      \n\\begin{figure}[h]\n\\centering\n\\includegraphics[width=0.9\\textwidth]{system_architecture.png}\n\
      \\caption{系统分层架构图}\n\\label{fig:system_architecture}\n\\end{figure}\n\n\\subsection{用户层}\n\
      \n用户层是系统与用户直接交互的前端界面，承担信息呈现与用户指令接收的职能。本系统采用浏览器-服务器架构，用户通过标准Web浏览器即可访问系统，无需安装额外客户端软件，显著提升了系统的易用性与可访问性。\n\
      \n用户层主要包括以下组件：\n\\begin{itemize}\n    \\item \\textbf{用户界面：} 基于React、Vue等现代前端框架构建的响应式单页面应用，提供论文主题输入、写作参数配置、内容生成过程展示、草稿编辑与导出等功能。界面设计遵循用户体验原则，确保操作流程简洁直观。\n\
