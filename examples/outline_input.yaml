      \n\\subsection{草稿撰写模块的实现}\n\n草稿撰写模块作为系统的核心，负责依据生成的大纲，逐步调用大语言模型完成各章节内容的撰写。其实现关键在于高效、可控的模型调用流程与上下文管理机制。\n\
      \n\\paragraph{模型调用流程}\n该模块采用“分而治之”的策略，将整体撰写任务分解为对大纲树中各叶子节点（即最低层级的小节）的独立内容生成任务。具体流程如下：\n\
      \n1.  \\textbf{任务调度}：系统遍历已存储的大纲树，按照从根到叶的顺序，将每个待撰写的小节标题作为独立的生成任务加入任务队列。该方法有效避免了单次调用生成全文所可能导致的内容不一致、长度超限与焦点模糊等问题。\n\
      \n2.  \\textbf{上下文构建}：为保障生成内容的连贯性，在针对特定小节（如“3.1 功能需求分析”）生成内容时，Prompt中会融入相关上下文信息。其模板设计如下：\n\
