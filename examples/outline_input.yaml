      \\end{itemize}\n\n模型层接收服务层的生成请求，经内部处理后，将大语言模型生成的文本内容返回至服务层。模型层通常部署于具备高性能GPU计算资源的服务器，以确保推理效率。\n\
      \n\\subsection{数据层}\n\n数据层负责系统所有数据的持久化存储、管理与访问，为上层服务提供可靠的数据支撑。根据数据类型与访问特征，系统采用多元化的存储方案。\n\
      \n数据层主要包括以下组件：\n\\begin{itemize}\n    \\item \\textbf{关系型数据库：} 采用MySQL或PostgreSQL，用于存储用户账户信息、论文项目元数据、系统配置、写作任务日志等结构化数据，保障事务一致性与数据完整性。\n\
      \    \\item \\textbf{文档数据库：} 采用MongoDB，用于存储非结构化的论文内容数据，如生成草稿、用户编辑历史、章节关联信息等，其灵活文档模型适于存储演进中的论文草稿。\n\
      \    \\item \\textbf{向量数据库：} 作为可选组件，用于存储学术文献等知识的向量化表示。在集成检索增强生成功能时，可高效进行语义相似度检索，为模型生成提供相关背景知识。\n\
      \    \\item \\textbf{缓存数据库：} 采用Redis，用于缓存用户会话、频繁访问的生成结果、系统配置等热点数据，显著提升系统响应速度。\n\
      \    \\item \\textbf{对象存储服务：} 用于存储用户上传的参考文献、图片等二进制文件，以及最终导出的PDF/DOCX格式论文文件。\n\
      \\end{itemize}\n\n数据层通过数据访问对象或ORM框架向服务层提供统一的数据访问接口，服务层无需关注底层存储细节，仅通过接口进行数据操作。\n\
      \n\\subsection{各层交互逻辑}\n\n系统各层次通过定义清晰的接口协议进行协同工作。以“生成论文引言”任务为例，其典型交互流程如下：\n\\\
      begin{enumerate}\n    \\item 用户在用户层界面输入主题并触发生成操作；\n    \\item 用户层通过HTTP请求将任务发送至服务层API网关；\n\
      \    \\item API网关完成认证后，将请求路由至写作任务服务；\n    \\item 写作任务服务验证参数，并可从数据层查询相关背景信息；\n\
      \    \\item 写作任务服务调用模型层的模型推理API，并传递由提示词工程模块构建的提示词；\n    \\item 模型层调用大语言模型进行推理，生成引言文本并返回至写作任务服务；\n\
      \    \\item 写作任务服务将生成内容发送至内容管理服务；\n    \\item 内容管理服务将内容持久化存储至数据层的文档数据库，并更新相关元数据；\n\
      \    \\item 写作任务服务将生成结果（如内容ID或直接返回内容）经API网关返回用户层；\n    \\item 用户层接收响应，更新界面状态，向用户展示生成的引言段落。\n\
      \\end{enumerate}\n\n综上所述，本系统通过分层架构设计，有效实现了关注点分离，使系统结构清晰、易于维护与扩展。各层次职责明确且协同高效，共同支撑自动化论文写作的核心业务流程。"
