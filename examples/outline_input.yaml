      \ 作为核心业务服务，负责接收用户写作请求，验证并预处理参数。该服务调用模型层接口获取大语言模型生成的文本，并管理写作任务的队列调度与状态跟踪。\n \
      \   \\item \\textbf{内容管理与编辑服务：} 负责对模型生成内容及用户编辑草稿进行持久化存储、版本管理、结构化组织（按章节划分），并提供文本编辑相关辅助功能。\n\
