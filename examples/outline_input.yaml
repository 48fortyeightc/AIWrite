      \n学术写作中的 Prompt 工程通常涵盖以下层面：\n\\begin{itemize}\n    \\item \\textbf{角色设定}：明确指示模型扮演特定角色，例如“你是一位计算机科学领域的学术专家”，从而约束其语言风格与知识视角。\n\
