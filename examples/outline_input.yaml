    \ Boot框架，因其在事务管理与安全性方面具备深厚积累；而内容生成等AI相关服务则采用Python（FastAPI）实现，以充分利用其在大数据与人工智能领域的库生态优势。此种混合技术栈策略允许针对不同任务选用最适宜的工具。\n\
    \n\\subsection{数据库设计}\n\\label{subsec:database_design}\n\n数据库设计遵循第三范式原则，以最大限度减少数据冗余并确保数据一致性。本节通过核心实体-关系图（图\\\
    ref{fig:er_diagram}）及主要数据表结构予以说明。\n\n\\begin{figure}[htbp]\n\\centering\n\\includegraphics[width=0.9\\\
    textwidth]{er_diagram.pdf}\n\\caption{系统核心E-R图}\n\\label{fig:er_diagram}\n\\end{figure}\n\
    \n\\subsubsection{核心数据表设计}\n系统核心数据表主要包括：\n\\begin{enumerate}\n    \\item \\textbf{用户表}：存储系统注册用户的详细信息。\n\
    \    \\item \\textbf{论文项目表}：核心表，记录每个论文项目的基本信息，并与用户表关联。\n    \\item \\textbf{论文章节表}：存储项目下各章节的内容，支持版本管理。\n\
