      LTS，系统服务采用 Docker 容器化部署。


      \subsection{响应时间测试}


      响应时间是衡量系统交互效率的核心指标，直接影响用户体验。本测试模拟用户提交论文写作请求（如生成摘要、润色段落）至系统返回完整结果的全过程。测试在不同负载条件下进行，包括低负载（10
      并发用户）与峰值负载（100 并发用户），并对结果取平均值。具体测试数据如表 \ref{tab:response_time} 所示。


      \begin{table}[h]

      \centering

      \caption{系统平均响应时间测试结果}

      \label{tab:response_time}

      \begin{tabular}{|c|c|c|}

      \hline

      \textbf{并发用户数} & \textbf{平均响应时间（秒）} & \textbf{95\% 百分位响应时间（秒）} \\ \hline

      10 & 3.2 & 4.1 \\ \hline

      50 & 4.8 & 6.5 \\ \hline

      \textbf{100} & \textbf{7.5} & \textbf{10.2} \\ \hline

      \end{tabular}

      \end{table}


      测试结果显示，在 10 并发用户的低负载条件下，系统平均响应时间为 3.2 秒，表现良好。当并发用户数增至目标值 100 时，平均响应时间上升至 7.5
      秒，95\% 的请求可在 10.2 秒内完成。该结果符合预期，主要由于大语言模型的推理过程计算密集，响应时间随并发请求数增加呈近似线性增长。系统通过异步处理与请求队列优化等技术，有效避免了响应时间的指数级恶化，保障了高并发场景下的服务可用性。


      \subsection{并发处理能力测试}


      并发处理能力是评估系统稳定性和可扩展性的关键。本测试通过压力测试工具（如 JMeter）持续向系统发起 100 个并发请求，持续时长为 15 分钟，以监测系统的吞吐量、错误率及资源利用率变化。


      在 100 并发用户的持续压力下，系统表现出良好的稳定性。吞吐量稳定在每分钟约 780–800 个请求，整个测试周期内成功处理请求数超过 11,700
      个。系统错误率（HTTP 状态码 5xx）低于 0.5\%，且主要出现在测试初始阶段的瞬时峰值，系统能迅速恢复稳定状态，表明其资源调度与负载均衡机制有效。服务器
      CPU 平均利用率为 85\% 左右，内存使用率稳定在 70\%，未出现内存泄漏或资源耗尽现象，验证了系统架构设计的合理性。


      \subsection{结果分析与讨论}


      综合性能测试结果，可得出以下结论：首先，系统成功实现了支持 100 并发用户的设计目标。尽管在峰值负载下响应时间有所增加，但仍处于可接受范围内，满足了非功能需求中对性能的基本要求。其次，系统在高并发压力下仍保持较高的吞吐量与较低的错误率，体现出良好的鲁棒性与可扩展性，能够有效应对短时高并发访问压力。


      当前系统的性能瓶颈主要集中在大语言模型推理模块，这也是当前基于大模型的 AI 应用面临的共性挑战。未来可从以下几方面进行优化：1）引入模型量化、知识蒸馏等轻量化技术，在保证生成质量的同时降低计算开销；2）实现更细粒度的动态资源分配策略，依据请求优先级灵活调整计算资源；3）探索缓存机制，对常见或相似的写作请求结果进行缓存，以显著降低重复计算的响应时间。综上所述，本次性能测试验证了系统核心架构的可行性，为后续优化与部署提供了重要的数据支撑。'
  - id: ch6.4
    title: 用户体验评估
    level: 2
    target_words: 600
    notes: 呈现用户满意度调查（NPS得分）、反馈意见及改进点
    draft_latex: "\\section{用户体验评估}\n\n为全面评估“基于大语言模型的自动化论文写作系统”的实际应用效果，本研究组织了专项用户体验评估。评估旨在通过量化的用户满意度数据和质性的用户反馈，深入分析系统的优势与不足，为后续迭代优化提供明确方向。评估活动邀请了50名来自不同学科背景的研究生及青年学者作为测试用户，他们在完成系统核心功能的使用后，参与了一项综合性的用户体验调查。\n\
      \n\\subsection{用户满意度调查与NPS得分}\n\n用户满意度调查采用业界通行的净推荐值（Net Promoter Score, NPS）作为核心量化指标。NPS通过询问用户“您有多大可能将本系统推荐给您的同事或朋友？”（0-10分量表）来评估用户的忠诚度和整体满意度。根据得分将用户分为三类：推荐者（9-10分）、被动者（7-8分）和贬损者（0-6分）。NPS的计算公式为推荐者百分比减去贬损者百分比。\n\
      \n本次评估共回收有效问卷50份。统计结果显示，系统获得的NPS得分为+42。具体而言，推荐者共计26人，占总体的52%；被动者共计15人，占30%；贬损者共计9人，占18%。+42的NPS得分表明系统在早期用户中获得了较为积极的评价，具备良好的用户接受度和发展潜力，尤其在提升写作效率和辅助构思方面得到了高度认可。然而，这一分数也提示系统在稳定性、内容深度等方面仍有提升空间，以转化被动者并减少贬损者。\n\
      \n\\subsection{用户反馈意见分析}\n\n对收集到的质性反馈进行归纳分析，主要积极反馈与存在问题如下所述。\n\n积极反馈主要集中在三个方面：\n\
      \\begin{enumerate}\n    \\item \\textbf{写作效率显著提升}：多数用户（约80\\%）认为系统能够快速生成论文各章节的草稿，极大地缩短了文献综述、方法论等部分的初始写作时间。\n\
      \    \\item \\textbf{构思辅助功能强大}：用户赞赏系统在提供论文结构建议、生成研究思路和关键词拓展方面的能力，认为其有效启发了科研灵感。\n\
      \    \\item \\textbf{界面交互简洁直观}：系统的用户界面设计获得了普遍好评，用户认为功能布局清晰，操作流程简单易上手。\n\\end{enumerate}\n\
      \n同时，用户也指出了系统当前存在的一些关键问题：\n\\begin{enumerate}\n    \\item \\textbf{内容准确性与深度有待加强}：部分用户（特别是理工科领域）反映，系统生成的内容有时存在事实性偏差或专业性不足的问题，对复杂概念的阐述不够深入。\n\
      \    \\item \\textbf{学术规范符合度不足}：生成的文本在引用格式、学术术语的严谨性方面偶有错误，需要用户花费额外精力进行校对和修改。\n\
      \    \\item \\textbf{长文本连贯性偶尔中断}：在生成长篇幅章节时，部分段落之间的逻辑衔接不够流畅，存在话题跳跃或内容重复的现象。\n\
      \    \\item \\textbf{对特定领域知识的适应性有限}：对于高度专业化或新兴交叉学科，系统的知识库覆盖度不足，导致生成内容的相关性下降。\n\
      \\end{enumerate}\n\n\\subsection{系统改进点}\n\n基于上述用户满意度数据和反馈意见，本研究提出以下关键改进点，以指导系统的后续开发：\n\
      \n\\begin{itemize}\n    \\item \\textbf{增强领域适应性}：引入领域微调（Domain Fine-tuning）技术，针对不同学科建立专业语料库，提升大语言模型在特定领域的知识准确性和内容深度。\n\
      \    \\item \\textbf{集成学术规范校验模块}：开发内嵌的学术规范检查器，自动检测并提示引用格式、术语一致性、逻辑结构等问题，辅助用户提升文稿质量。\n\
      \    \\item \\textbf{优化长文本生成算法}：改进模型的长文本处理能力，例如通过引入更复杂的注意力机制或分层生成策略，确保章节内部与章节之间的连贯性和一致性。\n\
      \    \\item \\textbf{建立用户反馈闭环}：在系统内设立便捷的反馈通道，鼓励用户对生成内容进行评分和纠错，利用这些反馈数据持续优化模型，实现迭代式学习。\n\
      \\end{itemize}\n\n综上所述，本次用户体验评估表明，本系统在提升写作效率方面具有显著价值，并获得了较为积极的用户反馈。同时，评估也清晰地揭示了其在内容深度、学术规范等方面面临的挑战。针对这些挑战提出的改进点，将为构建一个更加可靠、智能的自动化学术写作工具奠定坚实基础。"
    final_latex: "\\section{用户体验评估}\n\n为全面评估“基于大语言模型的自动化论文写作系统”的实际应用效果，本研究组织了一次专项用户体验评估。该评估旨在通过量化用户满意度数据并结合质性用户反馈，深入分析系统的优势与不足，从而为后续系统迭代优化提供明确依据。评估共邀请了50名来自不同学科背景的研究生及青年学者作为测试用户。所有参与者在完成系统核心功能的使用后，均参与了一项综合性的用户体验调查。\n\
      \n\\subsection{用户满意度调查与NPS得分}\n\n用户满意度调查采用业界广泛使用的净推荐值（Net Promoter Score, NPS）作为核心量化指标。NPS通过询问用户“您有多大可能将本系统推荐给您的同事或朋友？”（采用0–10分量表）来评估用户的忠诚度及整体满意度。根据得分，用户被划分为三类：推荐者（9–10分）、被动者（7–8分）和贬损者（0–6分）。NPS最终得分为推荐者所占百分比减去贬损者所占百分比。\n\
      \n本研究共回收有效问卷50份。统计结果显示，系统获得的NPS得分为+42。具体而言，推荐者共计26人，占比52\\%；被动者15人，占比30\\%；贬损者9人，占比18\\\
      %。+42的NPS得分表明系统在早期用户中获得了较为积极的整体评价，具备良好的用户接受度与发展潜力，尤其在提升写作效率与辅助研究构思方面得到高度认可。然而，该分数也提示系统在内容生成稳定性、专业深度等方面仍存在改进空间，以进一步提升被动用户的满意度并减少贬损者比例。\n\
      \n\\subsection{用户反馈意见分析}\n\n本研究对收集到的质性反馈进行了系统归纳与主题分析，主要积极反馈与存在问题如下所述。\n\n积极反馈主要集中在以下三个方面：\n\
      \\begin{enumerate}\n    \\item \\textbf{写作效率显著提升}：约80\\%的用户指出，系统能够快速生成论文各章节的草稿，尤其在文献综述、研究方法等部分大幅缩短了初始写作时间。\n\
      \    \\item \\textbf{构思辅助功能强大}：用户普遍赞赏系统在论文结构建议、研究思路拓展及关键词生成等方面的能力，认为其有效激发了科研灵感。\n\
      \    \\item \\textbf{界面交互简洁直观}：系统的用户界面设计获得广泛好评，用户认为功能布局合理、操作流程清晰，学习成本较低。\n\\\
      end{enumerate}\n\n同时，用户也指出了系统目前存在的一些关键问题：\n\\begin{enumerate}\n    \\item \\\
      textbf{内容准确性与深度有待加强}：部分用户（尤其在理工科领域）反映，系统生成的内容偶现事实性偏差或专业性不足，对复杂概念的阐述不够深入。\n \
      \   \\item \\textbf{学术规范符合度不足}：生成文本在引用格式、学术术语使用等方面存在一定误差，需用户额外投入时间进行校对与修正。\n\
      \    \\item \\textbf{长文本连贯性偶尔中断}：在生成长篇幅章节时，部分段落间逻辑衔接不够自然，存在话题跳跃或内容重复现象。\n  \
      \  \\item \\textbf{对特定领域知识的适应性有限}：面对高度专业化或新兴交叉学科课题时，系统知识库覆盖不全面，导致生成内容的相关性与准确性下降。\n\
      \\end{enumerate}\n\n\\subsection{系统改进方向}\n\n基于上述用户满意度数据与反馈意见，本研究提出以下关键改进方向，以指导系统的后续开发工作：\n\
      \n\\begin{itemize}\n    \\item \\textbf{增强领域适应性}：通过引入领域微调（Domain Fine-tuning）技术，构建学科专用语料库，以提升大语言模型在特定学术领域的知识准确性与内容深度。\n\
      \    \\item \\textbf{集成学术规范校验模块}：开发内嵌的学术规范自动检查工具，用于检测并提示引用格式、术语一致性、逻辑结构等方面的问题，辅助用户提升文稿质量。\n\
      \    \\item \\textbf{优化长文本生成算法}：改进模型的长文本处理机制，例如引入更复杂的注意力机制或分层生成策略，以增强章节内及章节间的连贯性与一致性。\n\
