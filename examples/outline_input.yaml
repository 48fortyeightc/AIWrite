      texttt{temperature=0.3} 以增强内容的严谨性与准确性，\\texttt{max\\_tokens=800} 以控制小节长度。对于摘要、核心方法等关键章节，系统可采用进阶策略，如先生成要点再扩展，或多次生成后择优融合。\n\
