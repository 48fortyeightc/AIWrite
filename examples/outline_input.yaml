      \subsection{修改模块}


      修改模块旨在对写作模块生成的论文草稿进行润色、优化和错误检查，以提升最终成果的学术质量和规范性。其设计体现了写作流程的迭代性与反馈机制。


      该模块的内部逻辑包含多个可并行或串行执行的子功能，主要包括：

      1.  \textbf{语言润色}：针对生成文本进行语法纠错、错别字校正、句式优化和学术术语统一，使语言表达更加流畅、专业。

      2.  \textbf{逻辑连贯性检查}：分析段落之间、章节之间的过渡与衔接，检查是否存在逻辑跳跃或矛盾，并可建议添加过渡句以增强整体连贯性。

      3.  \textbf{内容完整性验证}：对照原始大纲，检查是否所有预设要点均在正文中得到充分阐述，是否存在重要内容的遗漏。

      4.  \textbf{格式规范化}：检查标题层级、图表引用、参考文献标注等是否符合预定的学术格式规范（如 \LaTeX 格式或特定期刊模板要求）。


      这些子功能的实现依赖于对大语言模型的定向调用。系统为每项修改任务设计专门的提示词，例如，“请对以下学术段落进行语言润色，使其更符合中文论文的书面表达习惯”。修改模块可采用多轮迭代的工作方式，即一次修改后，可再次调用相关子功能进行二次精修。用户在此过程中拥有最终控制权，可审阅系统建议的每一处修改，并决定是否采纳。该模块的最终输出为一份经过优化和校验、可供用户最终审阅和定稿的论文版本。


      \subsection{模块接口设计}


      为确保四个核心模块能够高效协同工作，系统设计了明确的接口规范。系统采用基于 RESTful API 或内部函数调用的方式进行数据交换。各模块间的关键接口与数据流定义如下：


      1.  \textbf{选题模块 → 大纲模块}：接口传递的数据结构为 `{"selected_topic": "论文标题", "topic_context":
      "主题背景说明"}`。

      2.  \textbf{大纲模块 → 写作模块}：接口传递的数据结构为结构化的论文大纲，通常采用 JSON 格式，包含章节的层次关系、标题和内容要点，例如
      `{"chapters": [{"title": "第一章", "sections": [{"title": "1.1", "key_points":
      ["点A", "点B"]}]}]}`。

      3.  \textbf{写作模块 → 修改模块}：接口传递的数据为完整的论文草稿全文，格式为纯文本或带有简单标记的文本。

      4.  \textbf{模块间回调接口}：此外，系统设计了回调机制。例如，当用户在修改模块中发现某章节内容需要大规模重写时，可通过接口调用写作模块，并附带具体的重写指令，实现模块间的灵活交互。


      通过上述功能模块的精细化设计与清晰的接口规范，系统能够将复杂的自动化论文写作任务分解为可管理、可优化的子过程，从而有效提升最终生成论文的质量和用户体验。'
  - id: ch4.3
    title: 技术选型
    level: 2
    target_words: 600
    notes: 说明大语言模型（如GPT-4/LLaMA 3）、后端框架（Spring Boot）、前端框架（Vue.js）的选择依据
    draft_latex: '\section{技术选型}


      在“基于大语言模型的自动化论文写作系统”的设计与实现过程中，技术选型是决定系统性能、可扩展性、开发效率及最终用户体验的关键环节。本章节将详细阐述系统核心组件——大语言模型、后端框架以及前端框架的选择依据，旨在论证所选技术方案的科学性与合理性。


      \subsection{大语言模型选型}


      大语言模型是本系统的核心智能引擎，其选型直接决定了自动化写作内容的质量、准确性和多样性。经过对当前主流大语言模型的技术特性、性能指标和应用生态进行综合评估，本系统选择以GPT-4和LLaMA
      3作为主要候选模型，其依据如下：


      首先，在模型性能方面，GPT-4（Generative Pre-trained Transformer 4）作为OpenAI发布的旗舰模型，在自然语言理解、内容生成、逻辑推理以及上下文连贯性方面表现出卓越的能力。其庞大的参数规模（据推测超过万亿）和广泛的知识覆盖范围，使其能够生成高质量的学术文本草稿、进行有效的文献综述和提供结构化的写作建议，这对于自动化论文写作至关重要。然而，考虑到GPT-4作为商业API可能存在的使用成本、数据隐私政策以及潜在的访问延迟问题，本系统同时将Meta公司开源的LLaMA
      3（Large Language Model Meta AI 3）纳入技术选型。LLaMA 3系列模型，特别是其较大参数规模的版本（如70B），在多项基准测试中展现了与GPT-4相媲美的性能，尤其是在推理和代码生成任务上。其开源特性允许进行本地化部署，为系统提供了更高的数据安全性和可控性，同时避免了持续的API调用费用，这对于需要处理敏感研究数据或期望长期稳定运行的学术环境具有重要意义。


      其次，在技术生态与可集成性方面，两种模型均拥有成熟的开发者社区和丰富的工具链支持。GPT-4提供了标准化的RESTful API，便于与后端服务快速集成。而LLaMA
      3则可以通过Hugging Face的Transformers库或Ollama等工具轻松部署和管理，为技术实现提供了灵活性。因此，本系统的设计将采用一种混合或可配置的策略，允许根据具体任务需求（如对生成质量要求极高的核心章节写作，或对响应速度与成本敏感的内容润色）和部署环境（云端或本地）灵活选择调用GPT-4
      API或本地部署的LLaMA 3模型实例。


      \subsection{后端框架选型}


      后端框架承担着系统业务逻辑处理、数据持久化、模型接口封装以及为前端提供稳定API的重要职责。本系统选择Spring Boot作为后端开发框架，主要基于以下几点考量：


      第一，成熟度与稳定性。Spring Boot是Java生态中最为成熟和广泛采用的企业级应用开发框架之一。它建立在强大的Spring框架基础之上，提供了开箱即用的特性，能够快速构建独立、生产级的Spring应用程序。其完善的文档、庞大的社区支持和长期的企业应用验证，确保了系统后端服务的稳定性和可靠性，这对于需要长时间无间断运行的学术工具至关重要。


      第二，开发效率与可维护性。Spring Boot通过自动配置和起步依赖（Starter）极大地简化了项目的初始搭建和配置过程，使开发者能够专注于业务逻辑的实现。其倡导的约定优于配置（Convention
      Over Configuration）原则和模块化设计，使得代码结构清晰，易于维护和扩展。此外，Spring Boot对微服务架构的良好支持，也为未来系统功能模块的拆分和独立部署预留了空间。


      第三，强大的集成能力。Spring Boot能够无缝集成各种数据访问技术（如JPA/Hibernate用于数据库操作）、安全框架（如Spring Security用于API认证授权）、任务调度（如Spring
      Scheduler）以及消息中间件等。这为系统集成大语言模型API、管理用户数据、实现异步任务（如长文本生成任务）提供了极大的便利。


      \subsection{前端框架选型}


      前端框架负责构建系统的用户界面，实现与用户的交互，其选型直接影响用户体验和开发效率。本系统采用Vue.js作为前端主体框架，理由如下：


      首先，渐进式与易上手特性。Vue.js是一个渐进式的JavaScript框架，核心库只关注视图层，易于与其他库或已有项目整合。同时，其学习曲线相对平缓，清晰的文档和直观的API设计使得开发团队能够快速上手并高效开发。这对于需要快速迭代和功能验证的学术项目原型开发阶段尤为有利。


      其次，响应式数据绑定与组件化开发。Vue.js通过其高效的响应式系统，能够实现数据与视图的自动同步，简化了DOM操作，提升了开发效率和应用的性能。其组件化开发模式允许将用户界面拆分为独立、可复用的组件，使得代码组织更清晰，更易于协作开发和长期维护。这对于构建一个功能复杂、交互丰富的论文写作工作台至关重要。


      最后，丰富的生态系统。Vue.js拥有活跃的生态系统，官方维护的路由库（Vue Router）、状态管理库（Vuex/Pinia）以及构建工具（Vite）形成了完整的前端解决方案。此外，基于Vue.js的UI组件库（如Element
      Plus、Ant Design Vue）提供了大量预制的、美观的UI组件，能够显著加速开发进程，并保证界面风格的一致性，有助于打造专业、易用的用户界面。


      综上所述，本系统的技术选型基于对各组件技术特性、项目需求及长期维护性的综合权衡。以大语言模型（GPT-4/LLaMA 3）为核心智能引擎，Spring
      Boot提供稳健高效的后端服务，Vue.js构建灵活友好的前端交互，这一技术栈组合为构建一个高性能、高可用、易扩展的自动化论文写作系统奠定了坚实的技术基础。'
    final_latex: '\section{技术选型}


      在“基于大语言模型的自动化论文写作系统”的设计与实现过程中，技术选型是影响系统性能、可扩展性、开发效率及最终用户体验的关键决策环节。本章将详细阐述系统核心组件——大语言模型、后端框架以及前端框架的选型依据，旨在论证所选技术方案的科学性与合理性。


      \subsection{大语言模型选型}


      大语言模型作为系统的核心智能引擎，其选型直接决定了生成内容的准确性、多样性和学术可信度。通过对当前主流大语言模型的技术特性、性能表现及生态支持进行综合评估，本系统选定GPT-4与LLaMA
      3作为主要候选模型，具体依据如下：


      在模型性能方面，GPT-4（Generative Pre-trained Transformer 4）作为OpenAI发布的先进生成式预训练模型，在自然语言理解、文本生成质量、逻辑推理能力以及上下文一致性方面表现卓越。其超大规模的参数量（据估计超过万亿）与广泛的知识覆盖范围，使其能够生成结构严谨、内容充实的学术文本草稿，并有效支持文献综述、论点提炼等学术写作任务。然而，GPT-4作为商业API服务，存在使用成本较高、数据隐私保护限制以及潜在的网络延迟等问题。为此，本系统同时引入Meta公司开源的大语言模型LLaMA
      3（Large Language Model Meta AI 3）作为重要补充。LLaMA 3系列模型，特别是参数量为70B的版本，在多项基准测试中展现出与GPT-4相媲美的性能，尤其在逻辑推理与代码生成任务中表现突出。其开源特性支持本地化部署，能够有效保障用户数据隐私，避免持续性的API调用费用，更适合对数据安全有较高要求的学术研究场景。


      在技术生态与系统集成方面，GPT-4与LLaMA 3均具备完善的工具链和活跃的开发者社区支持。GPT-4提供标准化的RESTful API接口，便于快速接入后端系统；而LLaMA
      3则可借助Hugging Face的Transformers库或Ollama等工具实现本地部署与灵活调度。基于上述分析，本系统采用可配置的多模型调度策略，允许根据具体任务需求（如核心章节撰写、内容润色或摘要生成）及部署环境（云端或本地），动态选择调用GPT-4
      API或本地部署的LLaMA 3实例，以兼顾生成质量、响应速度与经济性。


      \subsection{后端框架选型}


      后端框架承担系统核心业务逻辑处理、数据持久化、模型服务集成及API接口封装等关键职责。本系统选用Spring Boot作为后端开发框架，主要基于以下考量：


      其一，框架成熟度与稳定性。Spring Boot作为Java生态中广泛采用的企业级开发框架，基于Spring框架构建，具备高度成熟的技术积累和广泛的工业界应用基础。其提供开箱即用的自动化配置机制，能够快速构建独立运行、生产级别的应用程序。Spring
      Boot拥有完善的文档体系、活跃的社区支持及长期的技术维护保障，能够确保系统后端在高并发、长周期运行环境下的稳定性和可靠性。


      其二，开发效率与可维护性。Spring Boot通过“约定优于配置”（Convention Over Configuration）的设计理念和起步依赖（Starters）机制，显著简化了项目初始配置与环境搭建流程，使开发人员能够聚焦于业务逻辑实现。其模块化架构与清晰的代码组织规范，有利于系统的长期维护与功能扩展。此外，Spring
      Boot对微服务架构的良好支持，也为系统未来可能的模块拆分与分布式部署提供了技术准备。


      其三，强大的集成与扩展能力。Spring Boot可无缝集成多种主流技术组件，包括数据访问层（如JPA/Hibernate）、安全控制框架（如Spring
      Security）、定时任务调度（如Spring Scheduler）及消息中间件等。这一特性为系统实现用户认证、数据管理、异步任务处理（如长文本生成队列）等功能提供了坚实基础，同时也便于后续接入更多AI服务或第三方学术资源。


      \subsection{前端框架选型}


      前端框架负责构建系统的用户交互界面，其选型直接影响用户的操作体验与开发迭代效率。本系统采用Vue.js作为前端主体框架，主要理由如下：


      首先，Vue.js具备渐进式框架特性与较低的学习门槛。其核心库专注于视图层渲染，结构清晰且易于集成至现有项目或与其他技术栈协同使用。Vue.js提供详尽的官方文档与直观的API设计，有利于开发团队快速掌握并开展高效开发，特别适合学术类项目中需要快速原型验证与功能迭代的场景。


      其次，Vue.js支持响应式数据绑定与组件化开发模式。其基于ES5的getter/setter机制实现数据驱动视图更新，有效简化DOM操作，提升界面渲染效率。同时，组件化开发方式允许将界面拆分为高内聚、可复用的功能单元，便于团队协作开发与代码维护，符合复杂交互型应用如论文写作工作台的建设需求。


      最后，Vue.js拥有完善的生态系统。官方维护的Vue Router、状态管理库Pinia（或Vuex）以及构建工具Vite，共同构成了一体化的前端开发解决方案。此外，基于Vue的UI组件库（如Element
      Plus、Ant Design Vue）提供了丰富且风格统一的界面元素，能够大幅提升开发效率，并保障系统界面的专业性与一致性。


      综上所述，本系统的技术选型基于对各项技术特性、项目需求及可持续发展能力的全面评估。通过以大语言模型（GPT-4/LLaMA 3）作为智能核心，Spring
      Boot构建稳健后端，Vue.js实现友好前端，该技术栈为构建一个高性能、可扩展、易维护的自动化论文写作系统提供了可靠支撑。'
  - id: ch4.4
    title: 数据库设计
    level: 2
    target_words: 500
    notes: 设计用户信息、论文数据、Prompt模板等核心表结构及关系
    draft_latex: "\\section{数据库设计}\n\n数据库作为系统数据持久化的核心，其设计的合理性直接关系到系统的性能、数据一致性及可扩展性。为支撑“基于大语言模型的自动化论文写作系统”的各项功能，本系统采用关系型数据库（如MySQL或PostgreSQL）进行数据存储。数据库设计遵循第三范式（3NF），以减少数据冗余并保证数据完整性。本节将详细阐述用户信息、论文数据、Prompt模板等核心表的结构及其相互关系。\n\
      \n\\subsection{核心表结构设计}\n\n\\subsubsection{用户信息表（user）}\n用户信息表用于存储系统注册用户的基本信息与身份验证数据，是系统权限控制的基础。其核心字段设计如下：\n\
      \\begin{itemize}\n    \\item \\textbf{user\\_id}：主键，采用自增整数或UUID，唯一标识每个用户。\n\
      \    \\item \\textbf{username}：用户名，唯一索引，用于登录和显示。\n    \\item \\textbf{email}：电子邮箱，唯一索引，用于账户验证和通信。\n\
      \    \\item \\textbf{password\\_hash}：经加密处理的密码哈希值，保障账户安全。\n    \\item \\textbf{role}：用户角色（如‘admin’,\
      \ ‘researcher’, ‘student’），用于实现基于角色的访问控制（RBAC）。\n    \\textbf{created\\_at}\
      \ 与 \\textbf{updated\\_at}：时间戳字段，分别记录账户创建时间和最后更新时间。\n\\end{itemize}\n该表通过 \\\
      textbf{user\\_id} 与其他表建立一对多关系。\n\n\\subsubsection{论文项目表（project）}\n论文项目表是组织和管理用户写作活动的核心，每个项目对应一篇独立的论文。其主要字段包括：\n\
      \\begin{itemize}\n    \\item \\textbf{project\\_id}：主键，唯一标识一个论文项目。\n    \\item\
      \ \\textbf{user\\_id}：外键，关联 \\textbf{user} 表，指明项目所属用户。\n    \\item \\textbf{title}：论文标题。\n\
      \    \\item \\textbf{subject\\_area}：论文所属学科领域（如‘计算机科学’、‘生物学’）。\n    \\item \\\
      textbf{status}：项目状态（如‘drafting’, ‘reviewing’, ‘completed’）。\n    \\item \\textbf{created\\\
      _at} 与 \\textbf{updated\\_at}：记录项目创建和最后修改时间。\n\\end{itemize}\n该表与用户信息表构成多对一关系，即一个用户可以拥有多个论文项目。\n\
      \n\\subsubsection{Prompt模板表（prompt\\_template）}\n为规范化和复用与大语言模型（LLM）的交互逻辑，系统设计了Prompt模板表。该表存储了针对不同写作场景（如生成摘要、撰写引言、润色语句）的预定义提示词模板。\n\
      \\begin{itemize}\n    \\item \\textbf{template\\_id}：主键，唯一标识一个模板。\n    \\item\
      \ \\textbf{template\\_name}：模板名称（如‘introduction\\_generator’）。\n    \\item \\\
      textbf{content}：模板内容，包含可被动态替换的占位符（如\\$\\{topic\\}）。\n    \\item \\textbf{purpose}：模板用途描述。\n\
      \    \\item \\textbf{is\\_public}：布尔值，标识该模板是否为公共模板可供所有用户使用。\n\\end{itemize}\n\
      该表与论文内容生成记录之间存在间接关系。\n\n\\subsubsection{论文内容表（paper\\_content）}\n论文内容表用于存储论文各个章节的具体内容及其元数据，是系统最核心的数据表之一。\n\
      \\begin{itemize}\n    \\item \\textbf{content\\_id}：主键。\n    \\item \\textbf{project\\\
      _id}：外键，关联 \\textbf{project} 表，指明内容所属的论文项目。\n    \\item \\textbf{chapter\\_title}：章节标题（如‘引言’、‘方法’）。\n\
      \    \\item \\textbf{section\\_order}：章节在论文中的顺序号。\n    \\item \\textbf{content\\\
      _text}：章节的文本内容，采用长文本类型（如LONGTEXT）存储。\n    \\item \\textbf{version}：内容版本号，支持版本控制与回溯。\n\
      \    \\item \\textbf{llm\\_generated}：布尔值，标记该内容是否为LLM自动生成。\n    \\item \\textbf{created\\\
      _at}：内容创建或生成时间。\n\\end{itemize}\n该表与论文项目表构成多对一关系，即一篇论文包含多个章节内容。\n\n\\subsubsection{生成记录表（generation\\\
      _history）}\n为追踪每次LLM交互的详细情况，便于审计、优化和用户体验分析，设计了生成记录表。\n\\begin{itemize}\n   \
      \ \\item \\textbf{history\\_id}：主键。\n    \\item \\textbf{project\\_id} 与 \\\
      textbf{content\\_id}：外键，分别关联到对应的项目和具体内容，记录此次生成作用于哪个项目的哪个部分。\n    \\item \\textbf{template\\\
      _id}：外键，关联所使用的Prompt模板。\n    \\item \\textbf{input\\_prompt}：实际发送给LLM的完整提示词。\n\
      \    \\item \\textbf{llm\\_response}：LLM返回的原始响应内容。\n    \\item \\textbf{model\\\
      _used}：所调用的大语言模型标识（如‘gpt-4’, ‘claude-3’）。\n    \\item \\textbf{timestamp}：请求发生的时间点。\n\
      \\end{itemize}\n\n\\subsection{表间关系与ER图概念}\n\n上述核心表通过外键关联，构成了系统的主要数据模型。其关系可概括为：\n\
      \\begin{itemize}\n    \\item \\textbf{用户（user）}与\\textbf{论文项目（project）}：一对多关系。\n\
      \    \\item \\textbf{论文项目（project）}与\\textbf{论文内容（paper\\_content）}：一对多关系。\n\
      \    \\item \\textbf{论文项目（project）}与\\textbf{生成记录（generation\\_history）}：一对多关系。\n\
      \    \\item \\textbf{论文内容（paper\\_content）}与\\textbf{生成记录（generation\\_history）}：一对多关系（一次生成可能对应一个内容版本的更新）。\n\
      \    \\item \\textbf{Prompt模板（prompt\\_template）}与\\textbf{生成记录（generation\\\
      _history）}：一对多关系。\n\\end{itemize}\n该数据库设计有效地组织了系统数据，确保了数据的一致性，并为系统的核心功能，如多用户项目管理、内容版本追踪和LLM交互审计，提供了坚实的基础。"
    final_latex: "\\section{数据库设计}\n\n数据库作为系统数据持久化的核心组件，其设计的合理性直接决定了系统的性能、数据一致性及可扩展性。为有效支撑“基于大语言模型的自动化论文写作系统”的各项功能，本系统选用关系型数据库（如\
      \ MySQL 或 PostgreSQL）作为数据存储方案。数据库设计严格遵循第三范式（3NF），旨在消除数据冗余、增强数据完整性，并提升查询效率。本节将详细阐述系统中所涉及的核心数据表结构及其相互关系，涵盖用户信息、论文项目、Prompt\
      \ 模板、论文内容以及生成记录等关键实体。\n\n\\subsection{核心表结构设计}\n\n\\subsubsection{用户信息表（user）}\n\
      用户信息表主要用于存储系统注册用户的基本信息与身份验证数据，构成系统权限管理的基础。其核心字段设计如下：\n\\begin{itemize}\n   \
      \ \\item \\textbf{user\\_id}：主键，采用自增整数或全局唯一标识符（UUID），用于唯一标识每位用户。\n    \\item\
      \ \\textbf{username}：用户名，具备唯一索引，用于用户登录及界面显示。\n    \\item \\textbf{email}：电子邮箱地址，设有唯一索引，用于账户验证及系统通知。\n\
      \    \\item \\textbf{password\\_hash}：经过安全加密处理的密码哈希值，确保用户账户的机密性。\n    \\item\
      \ \\textbf{role}：用户角色（如‘admin’、‘researcher’、‘student’），支持基于角色的访问控制（RBAC）机制。\n\
      \    \\item \\textbf{created\\_at} 与 \\textbf{updated\\_at}：分别为账户创建时间和最后更新时间戳，用于审计与维护。\n\
      \\end{itemize}\n该表通过 \\textbf{user\\_id} 字段与系统中其他相关表建立一对多关系。\n\n\\subsubsection{论文项目表（project）}\n\
      论文项目表用于组织和管理用户的论文写作活动，每个项目对应一篇独立的论文。其主要字段包括：\n\\begin{itemize}\n    \\item \\\
      textbf{project\\_id}：主键，用于唯一标识一个论文项目。\n    \\item \\textbf{user\\_id}：外键，关联\
      \ \\textbf{user} 表，标识项目所属用户。\n    \\item \\textbf{title}：论文标题。\n    \\item \\\
      textbf{subject\\_area}：论文所属学科领域（如‘计算机科学’、‘生物学’）。\n    \\item \\textbf{status}：项目当前状态（如‘drafting’、‘reviewing’、‘completed’）。\n\
      \    \\item \\textbf{created\\_at} 与 \\textbf{updated\\_at}：分别记录项目创建时间及最后更新时间。\n\
      \\end{itemize}\n该表与用户信息表构成多对一关系，即一位用户可以创建并管理多个论文项目。\n\n\\subsubsection{Prompt模板表（prompt\\\
      _template）}\n为规范化和复用与大语言模型（LLM）的交互流程，系统设计了 Prompt 模板表。该表存储针对不同写作任务（如生成摘要、撰写引言、语句润色等）的预定义提示词模板。\n\
      \\begin{itemize}\n    \\item \\textbf{template\\_id}：主键，用于唯一标识一个模板。\n    \\\
      item \\textbf{template\\_name}：模板名称（如‘introduction\\_generator’），具备可读性。\n  \
      \  \\item \\textbf{content}：模板具体内容，其中包含可动态替换的占位符（如 \\$\\{topic\\}）。\n    \\\
      item \\textbf{purpose}：模板用途的详细说明。\n    \\item \\textbf{is\\_public}：布尔类型字段，标识该模板是否为公共模板，可供所有用户使用。\n\
      \\end{itemize}\n该表与论文内容生成记录表之间存在间接引用关系。\n\n\\subsubsection{论文内容表（paper\\_content）}\n\
      论文内容表用于存储论文各章节的具体内容及其相关元数据，是系统的核心数据表之一。\n\\begin{itemize}\n    \\item \\textbf{content\\\
      _id}：主键。\n    \\item \\textbf{project\\_id}：外键，关联 \\textbf{project} 表，指明该内容所属的论文项目。\n\
      \    \\item \\textbf{chapter\\_title}：章节标题（如‘引言’、‘研究方法’）。\n    \\item \\textbf{section\\\
      _order}：章节在论文中的排列序号。\n    \\item \\textbf{content\\_text}：章节文本内容，采用长文本类型（如 LONGTEXT）存储。\n\
      \    \\item \\textbf{version}：内容版本号，支持多版本管理与回溯。\n    \\item \\textbf{llm\\_generated}：布尔值，标识该内容是否由大语言模型自动生成。\n\
      \    \\item \\textbf{created\\_at}：内容创建或最后生成的时间戳。\n\\end{itemize}\n该表与论文项目表构成多对一关系，即一个论文项目可包含多个章节内容条目。\n\
      \n\\subsubsection{生成记录表（generation\\_history）}\n为全面追踪每次与大语言模型交互的详细信息，便于后续审计、效果优化与用户行为分析，系统设计了生成记录表。\n\
      \\begin{itemize}\n    \\item \\textbf{history\\_id}：主键。\n    \\item \\textbf{project\\\
      _id} 与 \\textbf{content\\_id}：外键，分别关联至对应的论文项目及具体内容条目，记录生成操作的作用范围。\n    \\item\
      \ \\textbf{template\\_id}：外键，关联所采用的 Prompt 模板。\n    \\item \\textbf{input\\\
      _prompt}：实际发送给大语言模型的完整提示词内容。\n    \\item \\textbf{llm\\_response}：大语言模型返回的原始响应文本。\n\
      \    \\item \\textbf{model\\_used}：所调用的大语言模型名称或版本标识（如‘gpt-4’、‘claude-3’）。\n\
      \    \\item \\textbf{timestamp}：请求发起的具体时间点。\n\\end{itemize}\n\n\\subsection{表间关系与ER图概念}\n\
      \n上述核心数据表通过外键相互关联，共同构建了系统的主要数据模型。各实体之间的关系可概括如下：\n\\begin{itemize}\n    \\item\
      \ \\textbf{用户（user）}与\\textbf{论文项目（project）}：一对多关系。\n    \\item \\textbf{论文项目（project）}与\\\
      textbf{论文内容（paper\\_content）}：一对多关系。\n    \\item \\textbf{论文项目（project）}与\\\
      textbf{生成记录（generation\\_history）}：一对多关系。\n    \\item \\textbf{论文内容（paper\\\
      _content）}与\\textbf{生成记录（generation\\_history）}：一对多关系（单次生成操作可能对应某一内容版本的更新）。\n\
      \    \\item \\textbf{Prompt模板（prompt\\_template）}与\\textbf{生成记录（generation\\\
      _history）}：一对多关系。\n\\end{itemize}\n该数据库设计在逻辑上紧密耦合系统业务需求，有效保障了数据的一致性、可查询性与可维护性，并为实现多用户项目管理、内容版本控制与大语言模型交互审计等核心功能提供了可靠的数据基础。"
  draft_latex: "\\section{系统总体设计}\n\\label{sec:system_design}\n\n本章节旨在详细阐述“基于大语言模型的自动化论文写作系统”的总体设计方案。系统设计是连接需求分析与系统实现的桥梁，其质量直接决定了最终系统的功能性、可靠性、可扩展性与可维护性。本章将从系统架构设计、功能模块设计、技术选型以及数据库设计四个核心方面，对系统的整体蓝图进行系统性描述。\n\
    \n\\subsection{系统架构设计}\n\\label{subsec:system_architecture}\n\n本系统采用经典的分层架构模式，旨在实现关注点分离，降低系统模块间的耦合度，提升开发效率与系统可维护性。整体架构自底向上可分为数据层、服务层、应用层和表现层，其逻辑架构如图\\\
    ref{fig:architecture}所示。\n\n\\begin{figure}[htbp]\n\\centering\n\\includegraphics[width=0.8\\\
    textwidth]{system_architecture.pdf}\n\\caption{系统总体架构图}\n\\label{fig:architecture}\n\
    \\end{figure}\n\n\\subsubsection{表现层}\n表现层是用户与系统交互的直接接口。本系统采用响应式Web前端设计，基于现代前端框架（如Vue.js或React）构建。该层主要负责接收用户输入（如论文主题、关键词、结构大纲等）、渲染系统生成的论文内容、提供实时编辑与格式化功能，并将用户的操作请求通过HTTP/HTTPS协议发送至应用层。响应式设计确保了用户在不同终端设备（如个人电脑、平板电脑）上均能获得良好的操作体验。\n\
    \n\\subsubsection{应用层}\n应用层作为系统的核心业务逻辑处理单元，承担了请求路由、业务调度、用户会话管理和权限控制等职责。本层采用高性能的Web应用框架（如Spring\
    \ Boot或Django）构建RESTful API，接收来自表现层的请求，对其进行验证与解析，并调用下层相应的服务模块完成具体任务。例如，当用户请求生成论文章节时，应用层会协调内容生成服务、文献管理服务等多个服务组件，并最终将处理结果封装后返回给表现层。\n\
    \n\\subsubsection{服务层}\n服务层是系统智能的核心体现，由一系列相对独立且可复用的微服务构成。这些服务共同协作，完成自动化写作的各项复杂任务。主要服务包括：\n\
    \\begin{itemize}\n    \\item \\textbf{用户管理服务}：负责用户注册、登录认证、权限校验和个人信息维护。\n    \\\
    item \\textbf{项目管理服务}：负责创建、保存、加载和删除用户的论文项目，管理项目元数据（如标题、状态、创建时间等）。\n    \\item\
    \ \\textbf{内容生成服务}：这是最核心的服务，负责与大语言模型进行交互。它接收经过预处理的结构化写作指令，调用LLM API，并对生成的文本进行初步的后处理（如格式规整、基础语法检查）。\n\
    \    \\item \\textbf{文献管理服务}：负责与学术数据库API集成，根据用户提供的关键词进行文献检索、摘要提取，并对用户引用的文献进行格式化管理（如支持BibTeX格式导入导出）。\n\
    \    \\item \\textbf{内容优化服务}：提供对已生成文本的润色、续写、缩写、语法纠错和学术风格调整等增值功能。\n\\end{itemize}\n\
    服务层内部采用消息队列（如RabbitMQ或Kafka）进行异步通信，以解耦服务间的依赖，并应对大语言模型API调用可能带来的高延迟问题，提升系统的整体吞吐能力和响应性。\n\
    \n\\subsubsection{数据层}\n数据层负责系统所有数据的持久化存储。它由关系型数据库（如MySQL或PostgreSQL）和缓存数据库（如Redis）组成。关系型数据库用于存储结构化数据，如用户信息、项目元数据、系统配置等。缓存数据库则用于缓存热点数据（如频繁访问的文献信息、用户会话）和大语言模型生成的部分通用内容模板，以显著减少数据库的直接访问压力和提高系统响应速度。\n\
    \n\\subsection{功能模块设计}\n\\label{subsec:functional_modules}\n\n基于需求分析，本系统被划分为以下五个核心功能模块，各模块间通过定义清晰的接口进行交互，共同构成完整的自动化写作工作流。\n\
    \n\\subsubsection{用户交互与管理模块}\n该模块是用户进入系统的门户，主要功能包括：\n\\begin{enumerate}\n    \\\
    item \\textbf{用户认证与授权}：实现基于角色的访问控制，区分普通用户、高级用户和管理员，确保系统安全。\n    \\item \\textbf{项目管理}：提供直观的界面供用户创建新论文项目，设定论文标题、研究领域、目标期刊等基本属性，并支持对历史项目的查看、编辑与删除。\n\
    \    \\item \\textbf{写作引导界面}：通过向导式界面，引导用户逐步输入论文的核心要素，如研究问题、研究方法、实验数据、核心论点等，为后续内容生成提供丰富的上下文。\n\
    \\end{enumerate}\n\n\\subsubsection{智能内容生成模块}\n本模块是系统的“大脑”，其核心工作流程如下：\n\\begin{enumerate}\n\
    \    \\item \\textbf{指令构建与优化}：将用户输入的自然语言需求，结合预定义的学术写作模板，构建成结构化、精确的提示词。此过程旨在消除歧义，引导大语言模型生成符合学术规范的内容。例如，生成“引言”时，提示词会明确要求包含研究背景、问题陈述、文献综述缺口和本文贡献。\n\
    \    \\item \\textbf{大语言模型调度}：负责与后端的大语言模型API（如GPT-4、ChatGLM、文心一言等）进行安全、稳定的通信。模块需要处理API调用频次限制、网络异常、响应超时等问题，并具备重试和降级策略。\n\
    \    \\item \\textbf{内容后处理}：对模型返回的原始文本进行初步清洗，包括去除无关的标记、规范章节标题格式、确保段落结构清晰等，以提升生成内容的直接可用性。\n\
    \\end{enumerate}\n\n\\subsubsection{文献检索与引用管理模块}\n为增强论文的学术严谨性，本模块提供以下功能：\n\\begin{enumerate}\n\
    \    \\item \\textbf{智能文献检索}：集成开放学术数据库（如CrossRef, arXiv, PubMed）的API，允许用户根据关键词、作者、标题等信息检索相关文献。\n\
    \    \\item \\textbf{引用管理}：用户可以将检索到的文献加入项目的文献库。系统支持自动生成标准的引文格式（如APA, MLA, IEEE），并在用户撰写过程中提供“插入引用”功能，自动在文末生成参考文献列表。\n\
    \\end{enumerate}\n\n\\subsubsection{内容编辑与优化模块}\n该模块承认当前大语言模型生成内容并非完美，旨在为用户提供强大的辅助编辑工具。\n\
    \\begin{enumerate}\n    \\item \\textbf{富文本编辑器}：提供类Word的在线编辑体验，支持字体、段落、列表等格式设置，以及图片、表格的插入。\n\
    \    \\item \\textbf{AI辅助优化}：集成轻量级的文本分析模型，提供语法检查、拼写纠正功能。同时，允许用户选择特定段落，调用内容优化服务进行“学术化润色”、“简化表达”或“扩展论述”。\n\
    \\end{enumerate}\n\n\\subsubsection{成果导出与格式化模块}\n本模块负责将最终稿件转化为可交付的格式。\n\\begin{enumerate}\n\
    \    \\item \\textbf{多格式导出}：支持将论文导出为常见的文件格式，包括PDF（适用于直接提交）、DOCX（便于进一步在Microsoft\
    \ Word中精细调整）以及LaTeX源码（满足特定学术出版需求）。\n    \\item \\textbf{模板化排版}：提供若干种预定义的学术论文模板（如会议论文、期刊论文），可根据模板自动调整论文的版式、页眉页脚、行距等，减轻用户的排版负担。\n\
    \n\\end{enumerate}\n\n\\subsection{技术选型}\n\\label{subsec:technology_stack}\n\n\
    为实现上述架构与功能，本系统选择了一套成熟、高效且开源友好的技术栈，具体选型如表\\ref{tab:tech_stack}所示。\n\n\\begin{table}[htbp]\n\
    \\centering\n\\caption{系统技术选型一览表}\n\\label{tab:tech_stack}\n\\begin{tabular}{|c|l|l|}\n\
    \\hline\n\\textbf{层次} & \\textbf{技术选项} & \\textbf{选型依据} \\\\\n\\hline\n表现层 & Vue.js\
    \ 3 + Element Plus & 响应式、组件化开发，生态丰富，学习曲线平缓。 \\\\\n\\hline\n应用层 & Spring Boot (Java)\
    \ & 企业级框架，稳定性高，微服务支持完善，社区活跃。 \\\\\n\\hline\n服务层 & Python (FastAPI) & 异步支持好，适合AI模型集成，API构建快速简洁。\
    \ \\\\\n\\hline\n大语言模型 & OpenAI GPT-4 API / 开源LLM（如ChatGLM-3） & GPT-4生成质量领先；开源模型保障数据隐私与成本可控。\
    \ \\\\\n\\hline\n数据层 & MySQL, Redis & MySQL关系型数据管理可靠；Redis高性能缓存。 \\\\\n\\hline\n\
    消息队列 & RabbitMQ & 轻量级，协议成熟，易于管理，满足服务解耦需求。 \\\\\n\\hline\n部署与运维 & Docker, Nginx\
    \ & Docker实现环境一致性；Nginx作为反向代理和负载均衡。 \\\\\n\\hline\n\\end{tabular}\n\\end{table}\n\
    \n技术选型的核心原则是平衡性能、开发效率、可维护性以及技术生态的成熟度。例如，在后端选择上，采用Spring Boot负责核心业务逻辑和用户管理，因其在事务管理和安全性方面有深厚积累；而内容生成等AI相关服务则采用Python（FastAPI）实现，以充分利用其在大数据和人工智能领域的库生态优势。这种混合技术栈允许为不同的任务选择最合适的工具。\n\
    \n\\subsection{数据库设计}\n\\label{subsec:database_design}\n\n数据库设计遵循第三范式，以减少数据冗余并保证数据一致性。本节通过核心实体-关系（E-R）图（图\\\
    ref{fig:er_diagram}）和主要数据表结构进行说明。\n\n\\begin{figure}[htbp]\n\\centering\n\\includegraphics[width=0.9\\\
    textwidth]{er_diagram.pdf}\n\\caption{系统核心E-R图}\n\\label{fig:er_diagram}\n\\end{figure}\n\
    \n\\subsubsection{核心数据表设计}\n\\begin{enumerate}\n    \\item \\textbf{用户表：存储系统注册用户的详细信息。}\n\
    \    \\item \\textbf{论文项目表：核心表，记录每个论文项目的基本信息，并与用户表关联。}\n    \\item \\textbf{论文章节表：存储项目下各个章节的内容，支持版本管理。}\n\
    \    \\item \\textbf{文献库表：存储用户上传或系统检索到的文献信息。}\n    \\item \\textbf{项目-文献关联表：多对多关系表，记录论文项目引用了哪些文献。}\n\
    \\end{enumerate}\n\n\\subsubsection{主要数据表结构示例}\n以下以\\textbf{论文项目表}和\\textbf{论文章节表}为例，展示其核心字段设计。\n\
    \n\\begin{table}[htbp]\n\\centering\n\\caption{论文项目表结构}\n\\label{tab:table_project}\n\
    \\begin{tabular}{|c|c|c|c|}\n\\hline\n字段名 & 数据类型 & 约束 & 说明 \\\\\n\\hline\nproject\\\
    _id & BIGINT & PRIMARY KEY, AUTO\\_INCREMENT & 项目唯一标识 \\\\\n\\hline\nuser\\_id\
    \ & BIGINT & FOREIGN KEY & 所属用户ID \\\\\n\\hline\ntitle & VARCHAR(255) & NOT NULL\
    \ & 论文标题 \\\\\n\\hline\nresearch\\_field & VARCHAR(100) &  & 研究领域 \\\\\n\\hline\n\
    created\\_time & DATETIME & NOT NULL & 创建时间 \\\\\n\\hline\nupdated\\_time & DATETIME\
    \ & NOT NULL & 最后更新时间 \\\\\n\\hline\nstatus & TINYINT & DEFAULT 1 & 项目状态（进行中/已完成）\
    \ \\\\\n\\hline\n\\end{tabular}\n\\end{table}\n\n\\begin{table}[htbp]\n\\centering\n\
    \\caption{论文章节表结构}\n\\label{tab:table_chapter}\n\\begin{tabular}{|c|c|c|c|}\n\\\
    hline\n字段名 & 数据类型 & 约束 & 说明 \\\\\n\\hline\nchapter\\_id & BIGINT & PRIMARY KEY,\
    \ AUTO\\_INCREMENT & 章节唯一标识 \\\\\n\\hline\nproject\\_id & BIGINT & FOREIGN KEY\
    \ & 所属项目ID \\\\\n\\hline\nchapter\\_title & VARCHAR(100) & NOT NULL & 章节标题（如“引言”）\
    \ \\\\\n\\hline\nchapter\\_content & LONGTEXT &  & 章节正文内容 \\\\\n\\hline\nchapter\\\
    _order & INT &  & 章节顺序 \\\\\n\\hline\ngeneration\\_prompt & TEXT &  & 生成此章节所用的提示词（用于追溯和优化）\
    \ \\\\\n\\hline\nversion & INT & DEFAULT 1 & 内容版本号 \\\\\n\\hline\n\\end{tabular}\n\
    \\end{table}\n\n数据库设计充分考虑了系统的扩展性。例如，“论文章节表”中的`generation_prompt`字段记录了内容生成时的原始指令，这对于后续分析生成效果、优化提示词策略具有重要价值。同时，通过`version`字段为未来实现章节内容的多版本对比与回滚功能预留了空间。\n\
    \n综上所述，本章从宏观架构到微观模块，从技术原理到数据存储，对自动化论文写作系统进行了全面的总体设计。该设计为后续的系统实现工作奠定了坚实的技术基础，确保了系统能够高效、稳定地满足既定需求。"
  final_latex: "\\section{系统总体设计}\n\\label{sec:system_design}\n\n本章旨在详细阐述“基于大语言模型的自动化论文写作系统”的总体设计方案。系统设计作为连接需求分析与系统实现的关键环节，其质量直接决定了最终系统在功能性、可靠性、可扩展性与可维护性等方面的表现。本章将从系统架构设计、功能模块设计、技术选型以及数据库设计四个核心维度，系统性地勾勒出系统的整体蓝图。\n\
    \n\\subsection{系统架构设计}\n\\label{subsec:system_architecture}\n\n本系统采用经典的分层架构模式，旨在实现关注点分离，降低模块间耦合度，从而提高开发效率与系统可维护性。如图\\\
    ref{fig:architecture}所示，整体架构自底向上可划分为数据层、服务层、应用层和表现层四个逻辑层次。\n\n\\begin{figure}[htbp]\n\
    \\centering\n\\includegraphics[width=0.8\\textwidth]{system_architecture.pdf}\n\
    \\caption{系统总体架构图}\n\\label{fig:architecture}\n\\end{figure}\n\n\\subsubsection{表现层}\n\
    表现层是用户与系统进行交互的直接接口。本系统采用基于现代前端框架（如Vue.js或React）的响应式Web设计，主要负责接收用户输入（包括论文主题、关键词、结构大纲等）、渲染系统生成的论文内容、提供实时编辑与格式化功能，并通过HTTP/HTTPS协议将用户操作请求传递至应用层。响应式设计确保用户在不同终端设备（如个人电脑、平板电脑）上均能获得一致且流畅的操作体验。\n\
    \n\\subsubsection{应用层}\n应用层作为系统的核心业务逻辑处理单元，承担请求路由、业务调度、用户会话管理及权限控制等关键职责。该层基于高性能的Web应用框架（如Spring\
    \ Boot或Django）构建RESTful API，负责接收来自表现层的请求，进行验证与解析后，调度下层相应的服务模块以完成具体任务。例如，当用户发起生成论文章节的请求时，应用层将协调内容生成服务与文献管理服务等多个组件，并将最终处理结果封装后返回至表现层。\n\
    \n\\subsubsection{服务层}\n服务层是系统智能能力的集中体现，由一系列相对独立且可复用的微服务构成。这些服务通过协同工作，共同完成自动化写作中的各项复杂任务。主要服务包括：\n\
    \\begin{itemize}\n    \\item \\textbf{用户管理服务}：负责用户注册、登录认证、权限校验及个人信息维护。\n    \\\
    item \\textbf{项目管理服务}：负责论文项目的创建、保存、加载与删除，并管理项目元数据（如标题、状态、创建时间等）。\n    \\item \\\
    textbf{内容生成服务}：作为系统最核心的服务，负责与大语言模型进行交互。该服务接收经预处理的写作指令，调用LLM API，并对生成文本进行初步的后处理（如格式规整与基础语法检查）。\n\
    \    \\item \\textbf{文献管理服务}：负责与学术数据库API集成，支持基于关键词的文献检索与摘要提取，并对用户引用的文献进行格式化管理（如支持BibTeX格式的导入与导出）。\n\
    \    \\item \\textbf{内容优化服务}：提供文本润色、续写、缩写、语法纠错及学术风格调整等增值功能。\n\\end{itemize}\n\
    为提升系统吞吐能力与响应性，服务层内部采用消息队列（如RabbitMQ或Kafka）实现异步通信，以解耦服务间依赖，并有效应对大语言模型API调用可能引发的高延迟问题。\n\
    \n\\subsubsection{数据层}\n数据层负责系统所有数据的持久化存储，由关系型数据库（如MySQL或PostgreSQL）与缓存数据库（如Redis）共同构成。关系型数据库用于存储用户信息、项目元数据、系统配置等结构化数据；缓存数据库则用于缓存热点数据（如频繁访问的文献信息、用户会话）及大语言模型生成的部分通用内容模板，以显著降低数据库访问压力并提升系统响应速度。\n\
    \n\\subsection{功能模块设计}\n\\label{subsec:functional_modules}\n\n基于前期需求分析，本系统被划分为五个核心功能模块。各模块间通过定义清晰的接口进行交互，共同构成完整的自动化写作工作流。\n\
    \n\\subsubsection{用户交互与管理模块}\n该模块作为用户访问系统的入口，主要提供以下功能：\n\\begin{enumerate}\n \
    \   \\item \\textbf{用户认证与授权}：实现基于角色的访问控制机制，区分普通用户、高级用户和管理员权限，确保系统安全性。\n    \\\
    item \\textbf{项目管理}：提供直观的界面供用户创建新论文项目，设定论文标题、研究领域、目标期刊等基本属性，并支持对历史项目的查看、编辑与删除操作。\n\
    \    \\item \\textbf{写作引导界面}：通过向导式界面引导用户逐步输入论文核心要素（如研究问题、研究方法、实验数据、核心论点等），为后续内容生成提供丰富的上下文信息。\n\
    \\end{enumerate}\n\n\\subsubsection{智能内容生成模块}\n本模块作为系统的“大脑”，其核心工作流程包括：\n\\begin{enumerate}\n\
    \    \\item \\textbf{指令构建与优化}：将用户输入的自然语言需求与预定义的学术写作模板相结合，构建结构清晰、表述精确的提示词。该过程旨在消除歧义，引导大语言模型生成符合学术规范的内容。例如，在生成“引言”部分时，提示词将明确要求涵盖研究背景、问题陈述、文献综述缺口及本文贡献等要素。\n\
    \    \\item \\textbf{大语言模型调度}：负责与后端大语言模型API（如GPT-4、ChatGLM、文心一言等）建立安全、稳定的通信连接。该模块需处理API调用频次限制、网络异常、响应超时等问题，并具备重试机制与降级策略以保障服务可靠性。\n\
    \    \\item \\textbf{内容后处理}：对模型返回的原始文本进行初步清洗，包括去除无关标记、规范章节标题格式、优化段落结构等，以提升生成内容的直接可用性。\n\
    \\end{enumerate}\n\n\\subsubsection{文献检索与引用管理模块}\n为增强论文的学术严谨性，本模块提供以下功能支持：\n\\\
    begin{enumerate}\n    \\item \\textbf{智能文献检索}：集成开放学术数据库（如CrossRef、arXiv、PubMed）的API，支持用户根据关键词、作者、标题等信息检索相关文献。\n\
    \    \\item \\textbf{引用管理}：用户可将检索到的文献添加至项目文献库。系统支持自动生成标准引文格式（如APA、MLA、IEEE），并在撰写过程中提供“插入引用”功能，自动在文末生成参考文献列表。\n\
    \\end{enumerate}\n\n\\subsubsection{内容编辑与优化模块}\n该模块旨在为用户提供强大的辅助编辑工具，以弥补当前大语言模型生成内容的不足。其主要功能包括：\n\
    \\begin{enumerate}\n    \\item \\textbf{富文本编辑器}：提供类Word的在线编辑体验，支持字体、段落、列表等格式设置，以及图片、表格的插入与编辑。\n\
    \    \\item \\textbf{AI辅助优化}：集成轻量级文本分析模型，提供语法检查与拼写纠正功能。同时，用户可选择特定段落，调用内容优化服务进行“学术化润色”、“简化表达”或“扩展论述”等操作。\n\
    \\end{enumerate}\n\n\\subsubsection{成果导出与格式化模块}\n本模块负责将最终稿件转化为可交付的格式，具体功能如下：\n\
    \\begin{enumerate}\n    \\item \\textbf{多格式导出}：支持将论文导出为PDF（适用于直接提交）、DOCX（便于在Microsoft\
    \ Word中进一步调整）及LaTeX源码（满足特定学术出版需求）等常见格式。\n    \\item \\textbf{模板化排版}：提供多种预定义的学术论文模板（如会议论文、期刊论文），可根据模板自动调整版式、页眉页脚、行距等排版要素，减轻用户的排版负担。\n\
    \\end{enumerate}\n\n\\subsection{技术选型}\n\\label{subsec:technology_stack}\n\n为实现上述架构与功能，本系统选用了一套成熟、高效且开源友好的技术栈，具体选型如表\\\
    ref{tab:tech_stack}所示。\n\n\\begin{table}[htbp]\n\\centering\n\\caption{系统技术选型一览表}\n\
    \\label{tab:tech_stack}\n\\begin{tabular}{|c|l|l|}\n\\hline\n\\textbf{层次} & \\\
    textbf{技术选项} & \\textbf{选型依据} \\\\\n\\hline\n表现层 & Vue.js 3 + Element Plus & 响应式、组件化开发，生态丰富，学习曲线平缓。\
    \ \\\\\n\\hline\n应用层 & Spring Boot (Java) & 企业级框架，稳定性高，微服务支持完善，社区活跃。 \\\\\n\\\
    hline\n服务层 & Python (FastAPI) & 异步支持良好，适合AI模型集成，API构建快速简洁。 \\\\\n\\hline\n大语言模型\
    \ & OpenAI GPT-4 API / 开源LLM（如ChatGLM-3） & GPT-4生成质量领先；开源模型保障数据隐私与成本可控。 \\\\\n\
    \\hline\n数据层 & MySQL, Redis & MySQL关系型数据管理可靠；Redis高性能缓存。 \\\\\n\\hline\n消息队列 &\
    \ RabbitMQ & 轻量级，协议成熟，易于管理，满足服务解耦需求。 \\\\\n\\hline\n部署与运维 & Docker, Nginx & Docker实现环境一致性；Nginx作为反向代理和负载均衡。\
