  - id: ch6.1
    title: 测试环境与方案
    level: 2
    target_words: 400
    notes: 描述测试环境（硬件配置、软件版本）及测试方法（功能测试、性能测试、用户测试）
    draft_latex: '\section{测试环境与方案}


      为确保“基于大语言模型的自动化论文写作系统”的稳定性、功能完备性及用户体验，本章节将详细阐述系统测试所采用的硬件与软件环境，并系统性地介绍测试方案，主要包括功能测试、性能测试和用户测试三个维度。


      \subsection{测试环境配置}


      测试环境是评估系统表现的基础，其配置需尽可能模拟真实应用场景。本系统的测试环境配置如下。


      \subsubsection{硬件环境}

      测试服务器采用一台高性能工作站，具体配置为：CPU采用Intel Xeon Silver 4210处理器（10核心20线程），主频2.20 GHz；内存为64
      GB DDR4 ECC RAM；存储系统为1 TB NVMe SSD固态硬盘，以确保模型加载与数据读写的速度。网络环境为千兆以太网，以模拟稳定的在线服务条件。该硬件配置旨在满足大语言模型推理对计算和内存的高要求。


      \subsubsection{软件环境}

      操作系统为Ubuntu 20.04 LTS。系统后端核心开发语言为Python 3.9，并依赖的关键软件库包括：PyTorch 1.12.1（用于大语言模型的加载与推理）、Transformers
      4.21.0库（用于调用预训练模型，如本系统采用的ChatGLM-6B）、FastAPI 0.88.0（用于构建RESTful API接口）。数据库采用MySQL
      8.0。前端测试环境为Chrome 110及以上版本的浏览器。


      \subsection{测试方案设计}


      测试方案旨在通过多角度验证，全面评估系统质量。本测试方案主要包括功能测试、性能测试和用户测试。


      \subsubsection{功能测试}

      功能测试采用黑盒测试方法，旨在验证系统各项功能是否符合需求规格说明。测试用例设计覆盖所有核心功能模块，包括：用户登录与权限管理、论文主题输入与参数设置、基于大语言模型的章节内容自动生成、内容编辑与导出、历史记录管理等。测试过程通过编写自动化测试脚本（使用Pytest框架）与手动测试相结合的方式，输入预设的测试数据，检验系统输出结果是否正确，并验证用户界面的交互逻辑是否符合预期。


      \subsubsection{性能测试}

      性能测试重点关注系统在高并发场景下的响应能力与稳定性。采用负载测试工具（如JMeter）模拟多用户并发请求，主要测试指标包括：（1）响应时间，测试系统在单用户及并发用户（如50/100用户）下，完成一次内容生成请求的平均响应时间和P95响应时间；（2）吞吐量，衡量系统在单位时间内能够成功处理的请求数量；（3）资源利用率，通过系统监控工具（如Prometheus+Grafana）记录测试过程中服务器的CPU、内存及GPU（若使用）的使用情况，评估系统资源消耗是否在合理范围内。


      \subsubsection{用户测试}

      为评估系统的实用性与易用性，邀请目标用户群体进行用户测试。参与者包括15名具有学术写作经验的研究生和青年教师。测试采用情境任务法，要求参与者在限定时间内使用本系统完成一项简单的论文章节写作任务。测试过程中，通过观察、录音及事后访谈收集定性反馈，并使用系统可用性量表（SUS）进行定量评估，重点关注用户对内容生成质量、界面友好度及操作流程顺畅性的主观感受。


      通过上述系统化的测试环境与方案，可为后续章节的测试结果分析与系统优化提供可靠的数据支持。'
    final_latex: '\section{测试环境与方案}


      为全面评估“基于大语言模型的自动化论文写作系统”在稳定性、功能完备性及用户体验等方面的表现，本章详细阐述测试所采用的硬件与软件环境，并系统介绍测试方案的设计与实施。测试工作主要围绕功能测试、性能测试和用户测试三个维度展开，旨在为系统的有效性提供可靠依据。


      \subsection{测试环境配置}


      测试环境的合理配置是准确评估系统性能的基础。为确保测试结果具有代表性和可复现性，本测试环境尽可能模拟实际应用场景，具体配置如下。


      \subsubsection{硬件环境}

      测试采用一台高性能工作站作为服务器，其主要配置包括：CPU 为 Intel Xeon Silver 4210 处理器（10 核心 20 线程，主频 2.20
      GHz），内存为 64 GB DDR4 ECC RAM，存储系统为 1 TB NVMe SSD 固态硬盘，以保障模型加载与数据读写的高效性。网络环境为千兆以太网，用于模拟稳定的在线服务条件。该硬件配置能够满足大语言模型在推理过程中对计算能力与内存容量的较高要求。


      \subsubsection{软件环境}

      操作系统选用 Ubuntu 20.04 LTS。系统后端基于 Python 3.9 开发，依赖的关键软件库包括：PyTorch 1.12.1（用于大语言模型的加载与推理）、Transformers
      4.21.0（用于调用预训练模型，本系统采用 ChatGLM-6B）、FastAPI 0.88.0（用于构建 RESTful API 接口）。数据库使用
      MySQL 8.0。前端测试在 Chrome 110 及以上版本的浏览器中进行。


      \subsection{测试方案设计}


      为从多角度验证系统质量，本测试方案涵盖功能、性能与用户三个层面的评估内容，确保测试的全面性和系统性。


      \subsubsection{功能测试}

      功能测试采用黑盒测试方法，旨在检验系统各项功能是否满足预设需求。测试用例设计覆盖所有核心模块，主要包括：用户登录与权限管理、论文主题输入与参数设置、基于大语言模型的章节内容自动生成、内容编辑与导出、历史记录管理等功能。测试过程中，结合自动化测试脚本（基于
      Pytest 框架）与人工手动测试，输入预设数据并验证输出结果的正确性，同时检查用户界面的交互逻辑是否符合预期。


      \subsubsection{性能测试}

      性能测试重点考察系统在高并发条件下的响应能力与资源使用效率。通过负载测试工具（如 JMeter）模拟多用户并发请求，主要监测以下指标：（1）响应时间，包括单用户与并发用户（如
      50/100 用户）场景下的平均响应时间及 P95 响应时间；（2）吞吐量，即单位时间内成功处理的请求数量；（3）资源利用率，借助系统监控工具（如 Prometheus
      与 Grafana）记录测试期间服务器的 CPU、内存及 GPU（若适用）使用情况，以评估系统资源消耗的合理性。


      \subsubsection{用户测试}

      为评估系统的实用性与易用性，邀请 15 名具有学术写作经验的研究生与青年教师参与用户测试。测试采用情境任务法，要求参与者在规定时间内使用系统完成一项简单的论文章节写作任务。通过观察、录音及事后访谈收集定性反馈，并辅以系统可用性量表（SUS）进行定量评估，重点分析用户对内容生成质量、界面友好度及操作流程顺畅性的主观感受。


      通过上述测试环境与方案的系统化实施，可为后续测试结果的分析以及系统的进一步优化提供充分的数据支持。'
