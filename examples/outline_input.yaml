      \n\\subsection{大纲生成模块的实现}\n\n在用户确定论文题目后，大纲生成模块负责构建论文的层级化结构。本系统采用树形数据结构来组织论文大纲，以确保其符合学术规范与逻辑严谨性。\n\
      \n\\paragraph{树形结构逻辑}\n论文大纲本质上是一个树形结构，根节点为论文标题，一级子节点对应各章（如绪论、相关工作等），章下分节（二级节点），节下可进一步划分小节（三级节点）。系统在内存中使用类JSON的嵌套字典结构来维护该树形图，其示例如下：\n\
