      \ engineering）进行一定程度的调控，但仍难以保证在所有学科与主题下均能生成风格一致、逻辑严密的文本。此外，商业大语言模型 API 的服务可用性、调用成本及速率限制也为系统的稳定运行和规模化应用带来了潜在风险。一旦上游模型服务出现中断或策略调整，本系统的核心功能将受到直接影响。\r\
