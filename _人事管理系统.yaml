  draft_latex: '\section{系统测试}


    系统测试是软件开发生命周期中验证系统是否满足需求规格说明的关键环节。通过系统性的测试活动，能够发现并修正系统中存在的缺陷，确保交付的软件产品具备预期的功能正确性、性能稳定性和运行可靠性。本章将围绕测试环境、功能测试以及性能与边界测试三个方面展开，详细记录测试过程与结果，以验证本人事管理系统的质量。


    \subsection{测试环境说明}


    测试环境的配置直接关系到测试结果的准确性与可靠性。本次系统测试构建了一个与实际部署环境高度相似的独立测试平台。硬件环境方面，测试服务器采用配置为Intel
    Xeon E5-2680 v4处理器、64GB内存、1TB SSD硬盘的物理服务器，模拟企业级应用的数据处理与存储需求。客户端则选用多台不同配置的PC机，涵盖主流操作系统如Windows
    10和Windows 11，并使用Chrome、Firefox、Edge等浏览器进行兼容性验证。


    软件环境方面，服务器操作系统为CentOS 7.9，数据库管理系统为MySQL 8.0，应用服务器采用Tomcat 9.0。该软件栈与系统实现阶段所采用的开发环境保持一致，确保了环境的一致性。网络环境模拟企业内部局域网，服务器与客户端通过千兆以太网交换机连接，网络延迟控制在1毫秒以内，以排除网络因素对系统性能测试的干扰。此测试环境为后续的功能与性能测试提供了稳定、可控的基础。


    \subsection{功能测试}


    功能测试旨在验证系统各模块是否按照需求规格正确实现其预定功能。测试采用黑盒测试方法，依据需求分析阶段定义的功能需求说明表设计测试用例。测试用例覆盖了用户登录、员工信息管理、考勤管理、薪资计算、报表查询等所有核心功能模块。


    用户登录模块的测试重点验证身份认证与权限控制。测试用例包括输入正确的用户名密码组合、错误的密码、不存在的用户名以及空输入等情况。测试结果表明，系统能准确识别合法用户并跳转至对应角色主页，对于非法访问尝试能及时给出明确的错误提示并禁止进入系统，符合安全设计要求。


    员工信息管理模块的测试涵盖信息的增、删、改、查操作。测试人员模拟HR角色，执行新增员工记录、修改员工部门信息、查询特定条件员工以及逻辑删除离职员工等操作。所有操作均能成功执行，数据变更实时同步至数据库，且在列表界面得到正确反映。例如，将一名员工从“技术部”调整至“市场部”后，其所属部门信息在员工详情页和部门统计报表中均更新无误。


    考勤与请假模块是业务流程复杂的部分。测试用例设计了正常的上下班打卡、请假申请与审批流程。测试模拟员工提交事假申请，随后以部门经理角色登录系统进行审批操作。系统能够准确记录申请时间、审批状态流转（待审批、已批准、已驳回），并在审批通过后自动更新该员工的考勤统计。薪资计算模块的测试则关联考勤数据，验证系统能否根据预设的薪资规则、考勤结果及扣款项目，准确计算出应发工资，生成工资条。


    报表查询模块测试了多种组合查询条件，如按时间段查询考勤记录、按部门筛选员工信息等。系统返回的查询结果准确，生成的统计图表数据与后台数据库记录一致。所有功能测试用例共计执行了85个，通过82个，通过率达到96.5%。未通过的3个用例涉及极端情况下的日期格式处理，已在开发阶段进行修复并经过回归测试确认。


    \subsection{性能测试与边界测试}


    性能测试评估系统在处理大量数据或高并发访问时的表现，边界测试则关注系统对输入参数极限值的处理能力。采用JMeter工具模拟多用户并发操作，对系统关键业务场景进行压力测试。


    测试场景一为高并发考勤打卡。模拟500名员工在上午9:00至9:05的短时间内同时进行打卡操作。系统平均响应时间为1.2秒，服务器CPU占用率峰值达到78%，未出现请求超时或系统崩溃的情况，表明系统具备良好的并发处理能力。测试场景二为大数据量报表生成，针对包含10000条员工记录的数据库执行全公司年度考勤统计报表生成操作，该操作在15秒内完成，响应时间在可接受范围内。


    边界测试主要针对输入字段的合法性校验。例如，在员工信息录入界面，测试人员尝试输入超出数据库字段定义长度的姓名（如超过50个字符）、非法的身份证号码格式、未来的入职日期等。系统在前端和后端均进行了有效验证，对非法输入给出了清晰的错误提示，并阻止了错误数据的提交，有效防止了脏数据的产生，保证了数据的完整性与一致性。性能与边界测试结果表明，系统在正常及峰值负载下均能稳定运行，具备投入实际使用的可靠性。'
  final_latex: '\section{系统测试}


    系统测试是软件开发生命周期中验证系统是否满足需求规格的关键环节。通过系统化的测试活动，能够识别并修正系统中存在的缺陷，从而保证交付的软件产品具备预期的功能正确性、性能稳定性和运行可靠性。本章从测试环境配置、功能测试、性能与边界测试三个维度展开，详细记录测试过程与结果，以评估本人事管理系统的整体质量。


    \subsection{测试环境说明}


    测试环境的配置直接影响测试结果的准确性和可靠性。本次系统测试搭建了一个与实际部署环境高度一致的独立测试平台。在硬件方面，测试服务器采用配备 Intel Xeon
    E5-2680 v4 处理器、64 GB 内存和 1 TB SSD 硬盘的物理服务器，以模拟企业级应用的数据处理与存储需求。客户端选用多台配置各异的 PC
    机，覆盖 Windows 10 和 Windows 11 等主流操作系统，并使用 Chrome、Firefox 和 Edge 等浏览器进行兼容性验证。


    软件环境方面，服务器操作系统为 CentOS 7.9，数据库管理系统为 MySQL 8.0，应用服务器采用 Tomcat 9.0。该软件栈与开发环境保持一致，确保环境一致性。网络环境模拟企业内部局域网，服务器与客户端通过千兆以太网交换机连接，网络延迟控制在
    1 毫秒以内，以排除网络因素对性能测试的干扰。整体测试环境为后续功能与性能测试提供了稳定且可控的基础。


    \subsection{功能测试}


    功能测试旨在验证系统各模块是否依据需求规格正确实现预定功能。测试采用黑盒测试方法，基于需求分析阶段所定义的功能需求说明表设计测试用例，覆盖用户登录、员工信息管理、考勤管理、薪资计算及报表查询等所有核心模块。


    用户登录模块测试重点检验身份认证与权限控制机制。测试用例包括正确用户名密码组合、错误密码、无效用户名及空输入等情形。测试结果显示，系统能准确识别合法用户并跳转至对应角色主页，对非法访问尝试能及时反馈明确错误信息并阻止进入系统，符合安全设计预期。


    员工信息管理模块测试涵盖增、删、改、查等操作。测试人员模拟 HR 角色执行新增员工记录、修改部门信息、条件查询及逻辑删除离职员工等操作。所有操作均成功执行，数据变更实时同步至数据库，并在界面中正确反映。例如，将员工从“技术部”调整至“市场部”后，其部门信息在详情页与统计报表中均更新无误。


    考勤与请假模块涉及较为复杂的业务流程。测试用例设计了正常打卡、请假申请与审批流程，模拟员工提交事假申请后，由部门经理审批。系统能准确记录申请时间、审批状态流转（待审批、已批准、已驳回），并在审批通过后自动更新考勤统计。薪资计算模块测试关联考勤数据，验证系统能否依据预设薪资规则、考勤结果及扣款项准确计算应发工资并生成工资条。


    报表查询模块测试针对多种组合条件进行，如按时间段查询考勤记录、按部门筛选员工信息等。系统返回结果准确，生成统计图表与数据库记录一致。全部功能测试共执行 85
    个用例，通过 82 个，通过率为 96.5\%。未通过的 3 个用例涉及极端日期格式处理问题，已在开发阶段修复并通过回归测试验证。


    \subsection{性能测试与边界测试}


    性能测试评估系统在处理大数据量或高并发访问时的表现，边界测试则检验系统对输入参数极限值的容错能力。测试采用 JMeter 工具模拟多用户并发操作，对关键业务场景进行压力测试。


    在高并发考勤打卡场景中，模拟 500 名员工在上午 9:00 至 9:05 期间同时打卡。系统平均响应时间为 1.2 秒，服务器 CPU 占用率峰值达 78\%，未出现请求超时或系统崩溃，表明系统具备良好的并发处理能力。在大数据量报表生成场景中，对含
    10000 条员工记录的数据库执行全公司年度考勤统计报表生成操作，该操作在 15 秒内完成，响应时间处于可接受范围。


    边界测试主要针对输入字段的合法性校验。测试人员尝试输入超出字段定义长度的姓名（如超过 50 字符）、非法身份证格式、未来入职日期等异常数据。系统在前端与后端均实现有效验证，对非法输入给出明确错误提示，并阻止错误数据提交，从而避免脏数据产生，保障了数据的完整性与一致性。性能与边界测试结果表明，系统在正常及高负载条件下均能稳定运行，具备实际应用的可靠性。'
